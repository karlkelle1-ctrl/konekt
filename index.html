<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#071428"/>
<title>KoneKt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   CONSERVATION INTÉGRALE DE TON DESIGN (CSS de index-39.html)
   ==========================================================================
*/
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#071428; --surface:#0D1F35; --card:#0F2040; --card2:#0A1830;
  --accent:#5BB8F5; --accl:#7DCAFF; --gold:#D4A017; --teal:#1A8A4A;
  --purple:#2952CC; --sand:#0D1F35; --sand2:#0F2545;
  --text:#FFFFFF; --text2:#C8DCF0; --muted:#6A8AAA;
  --border:#1A3A5A; --border2:#1F4570;
  --ok:#1A8A4A; --warn:#D4A017; --err:#E05555;
  --shadow:0 2px 16px rgba(0,10,30,.3);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;overflow:hidden;background:var(--bg);}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#bottom-nav{display:none;flex-shrink:0;margin:0 16px 12px;background:var(--text);border-radius:26px;padding:10px 8px;box-shadow:0 8px 32px rgba(4,13,26,.28);}
#bottom-nav.show{display:flex;}
.nav-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 4px;border-radius:18px;position:relative;}
.nav-btn.active{background:linear-gradient(135deg,#1A8A4A,#2952CC);}
.nav-btn .nav-lbl{font-size:9px;font-weight:700;color:rgba(0,0,0,.45);}
.nav-btn.active .nav-lbl{color:#fff;}
#toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);padding:11px 20px;border-radius:50px;font-weight:700;z-index:9999;display:none;color:#fff;}
/* Animations originales conservées */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.fadeUp{animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both;}
</style>
</head>
<body>
<div id="app">
  <div class="screen" id="screen"></div>
  <nav id="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="goTab('home')"><span class="nav-icon">🏠</span><span class="nav-lbl">Accueil</span></button>
    <button class="nav-btn" id="nav-msgs" onclick="goTab('msgs')"><span class="nav-icon">💬</span><span class="nav-lbl">Messages</span></button>
    <button class="nav-btn" id="nav-cmds" onclick="goTab('cmds')"><span class="nav-icon">📦</span><span class="nav-lbl">Commandes</span></button>
    <button class="nav-btn" id="nav-profile" onclick="goTab('profile')"><span class="nav-icon">👤</span><span class="nav-lbl">Profil</span></button>
  </nav>
</div>
<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
/* 1. CONFIGURATION FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyCkXKO6i9oOjwJkFqO3QfeucJGc5i5WDbc",
  authDomain: "konekt-788c3.firebaseapp.com",
  projectId: "konekt-788c3",
  storageBucket: "konekt-788c3.firebasestorage.app",
  messagingSenderId: "1044180836092",
  appId: "1:1044180836092:android:30052dbd45705fa42a0179"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* 2. ÉTAT (SANS LES DONNÉES FICTIVES) */
let STATE = {
  screen: 'splash',
  user: null,
  tab: 'home',
  providers: [],
  chats: [],
  splashStep: 0
};

/* 3. FONCTIONS DE RENDU (IDENTIQUES À TON ORIGINAL) */
const $ = id => document.getElementById(id);
const s = html => { $('screen').innerHTML = html; };

function showToast(msg, color='#22C55E'){
  const t=$('toast'); t.textContent=msg; t.style.background=color; t.style.display='block';
  setTimeout(()=>t.style.display='none',2800);
}

function setNav(show, active){
  const nav=$('bottom-nav');
  nav.className=show?'show':'';
  ['home','msgs','cmds','profile'].forEach(k=>{
    const b=$('nav-'+k);
    if(b) b.className='nav-btn'+(k===active?' active':'');
  });
}

function render(){
  if(STATE.screen==='splash') renderSplash();
  else if(STATE.screen==='welcome') renderWelcome();
  else if(STATE.screen==='app') renderApp();
}

// TON SPLASH SCREEN ORIGINAL
function renderSplash(){
  setNav(false);
  s(`<div class="fadeUp" style="padding:48px 24px; text-align:center;">
      <h1 style="color:var(--accent); font-size:40px;">KoneKt</h1>
      <p style="margin-top:20px;">Connexion des services au Cameroun</p>
      <button class="nav-btn active" style="margin-top:50px; padding:15px 30px; border-radius:20px; color:white;" onclick="STATE.screen='welcome'; render();">Commencer</button>
    </div>`);
}

// TON WELCOME SCREEN ORIGINAL
function renderWelcome(){
  setNav(false);
  s(`<div class="fadeUp" style="padding:40px 24px; text-align:center;">
      <h2>Bienvenue</h2>
      <button class="nav-btn active" style="width:100%; margin-top:20px; padding:20px; border-radius:15px; color:white;" onclick="STATE.screen='app'; render();">Entrer dans l'App</button>
    </div>`);
}

// TON APPLICATION (MODIFIÉE POUR LES VRAIES DONNÉES)
function renderApp(){
  setNav(true, STATE.tab);
  if(STATE.tab === 'home') renderHome();
  else if(STATE.tab === 'profile') renderAdmin();
}

function renderHome(){
  s(`<div style="padding:20px;">
      <h3 style="font-family:'Clash Display'">Prestataires Réels</h3>
      <div style="margin-top:20px;">
        ${STATE.providers.length === 0 ? 
          '<p style="color:var(--muted)">Aucun inscrit pour le moment.</p>' : 
          STATE.providers.map(p => `<div style="background:var(--card); padding:15px; border-radius:15px; margin-bottom:10px; border:1px solid var(--border)">
            <strong>${p.nom}</strong><br><small>${p.metier || 'Service général'}</small>
          </div>`).join('')}
      </div>
    </div>`);
}

function renderAdmin(){
  s(`<div style="padding:20px;">
      <h3 style="font-family:'Clash Display'">Administration</h3>
      <div style="background:var(--accent); color:var(--bg); padding:20px; border-radius:20px; margin-top:15px;">
        <div style="font-size:12px;">TOTAL INSCRITS</div>
        <div style="font-size:32px; font-weight:800;">${STATE.providers.length}</div>
      </div>
      <button style="margin-top:20px; width:100%; padding:15px; background:var(--err); color:white; border:none; border-radius:10px;" onclick="auth.signOut(); location.reload();">Déconnexion</button>
    </div>`);
}

function goTab(t){ STATE.tab=t; render(); }

/* 4. SYNCHRONISATION FIRESTORE */
auth.onAuthStateChanged(async (user) => {
  STATE.user = user;
  // On écoute les vrais prestataires en temps réel
  db.collection("users").where("role", "==", "prestataire").onSnapshot(snap => {
    STATE.providers = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
    render();
  });
});

window.onload = () => render();
</script>
</body>
</html>
