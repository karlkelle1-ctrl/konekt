<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#FAFAF8"/>
<title>KoneKt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  /* KoneKt Night — nuit bleue, vert, bleu ciel, doré */
  --bg:#071428;
  --surface:#0D1F35;
  --card:#0F2040;
  --card2:#0A1830;
  --accent:#5BB8F5;       /* bleu ciel */
  --accl:#7DCAFF;         /* bleu ciel clair */
  --gold:#D4A017;         /* or */
  --teal:#1A8A4A;         /* vert */
  --purple:#2952CC;       /* bleu royal */
  --sand:#0D1F35;         /* surface nuit */
  --sand2:#0F2545;
  --text:#FFFFFF;         /* blanc */
  --text2:#C8DCF0;        /* blanc bleuté */
  --muted:#6A8AAA;        /* bleu gris */
  --border:#1A3A5A;
  --border2:#1F4570;
  --ok:#1A8A4A;
  --warn:#D4A017;
  --err:#E05555;
  --shadow:0 2px 16px rgba(0,10,30,.3);
  --shadow-lg:0 8px 40px rgba(0,10,30,.5);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;overflow:hidden;background:var(--bg);}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.screen::-webkit-scrollbar{display:none;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shakeX{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
@keyframes pulse{0%,100%{opacity:.25;transform:scale(.75)}50%{opacity:1;transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes waxSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.fadeUp{animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both;}

input,textarea,button{font-family:'Plus Jakarta Sans',sans-serif;outline:none;}
button{cursor:pointer;transition:all .18s cubic-bezier(.22,1,.36,1);}
button:active{transform:scale(.93);}
textarea{resize:none;}

/* ── BOTTOM NAV — flottant arrondi ── */
#bottom-nav{
  display:none;flex-shrink:0;
  margin:0 16px 12px;
  background:var(--text);
  border-radius:26px;
  padding:10px 8px max(10px,env(safe-area-inset-bottom));
  box-shadow:0 8px 32px rgba(4,13,26,.28);
}
#bottom-nav.show{display:flex;}
.nav-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 4px;border-radius:18px;position:relative;transition:background .2s;}
.nav-btn.active{background:linear-gradient(135deg,#1A8A4A,#2952CC);}
.nav-btn .nav-icon{font-size:20px;line-height:1;}
.nav-btn .nav-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:.3px;}
.nav-btn.active .nav-lbl{color:#fff;}
.nav-btn .nav-dot{display:none;}
.nav-badge{position:absolute;top:-2px;right:14%;width:15px;height:15px;border-radius:50%;color:#fff;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--text);background:linear-gradient(135deg,#1A8A4A,#2952CC);}

/* ── TOAST ── */
#toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);padding:11px 20px;border-radius:50px;font-weight:700;font-size:13px;z-index:9999;white-space:nowrap;display:none;animation:slideIn .3s ease;color:#fff;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(4,13,26,.5);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:flex-end;justify-content:center;}
.modal-sheet{background:var(--bg);border-radius:28px 28px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;animation:slideUp .35s cubic-bezier(.22,1,.36,1);padding-bottom:env(safe-area-inset-bottom);}
.modal-sheet::-webkit-scrollbar{display:none;}
.modal-handle{width:40px;height:4px;border-radius:2px;background:var(--border2);margin:14px auto 0;}

/* ── CARDS ── */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:18px;box-shadow:var(--shadow);}

/* ── BUTTONS ── */
.btn{border:none;border-radius:16px;font-weight:700;font-size:15px;padding:15px 22px;transition:all .2s;width:100%;}
.btn-primary{background:linear-gradient(135deg,#1A8A4A,#2952CC);color:#fff;box-shadow:0 4px 20px rgba(91,184,245,.35);}
.btn-primary:active{box-shadow:0 2px 8px rgba(91,184,245,.2);}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border2);}
.btn-danger{background:#CC222211;color:var(--err);border:1.5px solid #CC222233;}
.btn-success{background:#1A8A4A11;color:var(--ok);border:1.5px solid #1A8A4A33;}
.btn-ghost{background:transparent;border:none;color:var(--accent);font-weight:700;font-size:14px;padding:8px 0;width:auto;}
.btn-sand{background:var(--sand);color:var(--text);border:none;}

/* ── INPUTS ── */
.input-wrap{margin-bottom:16px;}
.input-wrap label{font-size:12px;color:var(--muted);font-weight:700;display:block;margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px;}
.input-field{display:flex;align-items:center;background:var(--sand);border:1.5px solid transparent;border-radius:14px;padding:0 14px;transition:all .2s;}
.input-field:focus-within{border-color:var(--accent);background:var(--card);box-shadow:0 0 0 4px rgba(91,184,245,.08);}
.input-field input,.input-field textarea{flex:1;background:transparent;border:none;color:var(--text);font-size:14px;padding:13px 0;outline:none;font-family:'Plus Jakarta Sans',sans-serif;}
.input-field textarea{padding:13px 0;min-height:80px;}

/* ── AVATAR ── */
.avatar{border-radius:30%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ── STARS ── */
.stars{color:var(--gold);}

/* ── MISC ── */
.stitle{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.step-dot{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#1A8A4A,#2952CC);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0;}
.step-line{width:2px;background:var(--border);position:absolute;left:17px;top:40px;bottom:0;}
.step-content{flex:1;padding-top:6px;}

/* ── WAX PATTERN (motif décoratif africain) ── */
.wax-bg{
  background-image:
    radial-gradient(circle at 20% 50%, rgba(91,184,245,.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(212,160,23,.08) 0%, transparent 40%),
    radial-gradient(circle at 60% 80%, rgba(26,138,122,.05) 0%, transparent 40%);
}
.wax-chip{
  width:120px;height:120px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  opacity:.07;position:absolute;pointer-events:none;
}
/* ── CHIP TAG ── */
.chip{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;background:var(--sand);color:var(--text2);}
.chip-accent{background:rgba(91,184,245,.12);color:var(--accent);}
.chip-ok{background:rgba(26,138,74,.12);color:var(--ok);}
.chip-err{background:rgba(204,34,34,.1);color:var(--err);}
.chip-gold{background:rgba(212,160,23,.12);color:var(--gold);}
</style>
</head>
<body>
<div id="app">
  <div class="screen" id="screen"></div>
  <nav id="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="goTab('home')">
      <span class="nav-icon">🏠</span><span class="nav-lbl">Accueil</span>
    </button>
    <button class="nav-btn" id="nav-msgs" onclick="goTab('msgs')">
      <span class="nav-icon">💬</span><span class="nav-lbl">Messages</span>
    </button>
    <button class="nav-btn" id="nav-cmds" onclick="goTab('cmds')">
      <span class="nav-icon">📦</span><span class="nav-lbl">Commandes</span>
    </button>
    <button class="nav-btn" id="nav-profile" onclick="goTab('profile')">
      <span class="nav-icon">👤</span><span class="nav-lbl">Profil</span>
    </button>
  </nav>
</div>
<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>

// SAFE CACHE VERSION CHECK
// Ne pas vider tous les caches à chaque chargement : cela casse le mode PWA
// et dégrade fortement les performances. On se contente ici d'un placeholder
// pour une future stratégie de versionnement.
const APP_VERSION = '1.1.0';

// ══════════════════════════════════════════════
//  FIREBASE CONFIG — konekt-788c3
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey:        "AIzaSyCkXKO6i9oOjwJkFqO3QfeucJGc5i5WDbc",
  authDomain:    "konekt-788c3.firebaseapp.com",
  projectId:     "konekt-788c3",
  storageBucket: "konekt-788c3.firebasestorage.app",
  messagingSenderId: "1044180836092",
  appId:         "1:1044180836092:android:30052dbd45705fa42a0179"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();
try { auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL); } catch(e) {}

window.FB = {
  fbRegister: async (email, password, role, nom, extra={}) => {
    const cred = await auth.createUserWithEmailAndPassword(email, password);
    await db.collection("users").doc(cred.user.uid).set({
      email, role, nom, creeLe: firebase.firestore.FieldValue.serverTimestamp(),
      ...extra
    });
    // Si vérification soumise, créer une demande admin
    if(extra.verifStatut === 'en_attente'){
      await db.collection("verifications").add({
        uid: cred.user.uid, nom, email, role,
        cni: extra.cni||'',
        photoBase64: extra.photoBase64||'',
        selfieBase64: extra.selfieBase64||'',
        verifStatut: 'en_attente',
        creeLe: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
    return cred.user;
  },
  fbLogin: async (email, password) => {
    const cred = await auth.signInWithEmailAndPassword(email, password);
    try {
      const snap = await db.collection("users").doc(cred.user.uid).get();
      if(snap.exists){
        return { uid: cred.user.uid, email, ...snap.data() };
      } else {
        // Compte Auth existe mais pas de doc Firestore — créer le doc
        const defaultData = { email, role: 'visiteur', nom: email.split('@')[0], creeLe: null };
        await db.collection("users").doc(cred.user.uid).set(defaultData);
        return { uid: cred.user.uid, ...defaultData };
      }
    } catch(e) {
      // Si Firestore inaccessible, connexion quand même
      return { uid: cred.user.uid, email, role: 'visiteur', nom: email.split('@')[0] };
    }
  },
  fbLogout: async () => { await auth.signOut(); },
  fbSaveMsg: async (convId, msg) => {
    const payload = { ...msg, creeLe: firebase.firestore.FieldValue.serverTimestamp() };
    await db.collection("conversations").doc(convId).collection("messages").add(payload);
    await db.collection("conversations").doc(convId).set({
      lastMessageText: msg.text || '',
      lastMessageSenderId: msg.senderId || '',
      lastMessageAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedLe: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
  },
  fbSaveCmd: async (cmd) => {
    await db.collection("commandes").doc(cmd.id).set({ ...cmd, creeLe: firebase.firestore.FieldValue.serverTimestamp() });
  },
};

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let STATE = {
  screen: 'splash',
  user: null,
  tab: 'home',
  selPrest: null,
  splashStep: 0,
  logoTaps: 0,
  logoTimer: null,
};

// ══════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════
let PRESTS = [];
let PRESTS_UNSUB = null;
let PRESTS_LOADED = false;
let CONVS_UNSUB = null;
let CHAT_UNSUB = null;
let ADMIN_VERIFS_UNSUB = null;
let CONVS = [];
let CMDS = [];
let PRODUCTS = [];
let CMDS_UNSUB = null;
let PRODUCTS_UNSUB = null;

const STATUTS = {
  en_attente:{label:"En attente",color:"#F59E0B",icon:"⏳"},
  confirme:{label:"Confirmé",color:"#0ECFC9",icon:"✅"},
  en_cours:{label:"En cours",color:"#FF6B2B",icon:"🔄"},
  termine:{label:"Terminé",color:"#22C55E",icon:"🎉"},
  annule:{label:"Annulé",color:"#EF4444",icon:"❌"},
};

// Démo uniquement : en production, l'accès admin doit être géré côté serveur
// avec rôles/claims Firebase, jamais avec un PIN dans le code client.
const ADMIN_PIN = "2580";
let logoTaps=0, logoTimer=null;
let activeCat="all", searchVal="", selConvId=null, selCmdId=null;
let newOrderStep=0, newOrderForm={prestId:null,service:"",adresse:"",date:"",heure:"08:00",duree:1};
let reviewNote=0, reviewComment="", adminTab="home";
let pendingPrests=[];
let signals=[];

// ══════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════
const $ = id => document.getElementById(id);
const s = n => { const sc=$('screen'); sc.innerHTML=n; sc.scrollTop=0; };
const fmt = n => n.toLocaleString('fr-FR')+' FCFA';
const stars = n => '★'.repeat(Math.floor(n))+'☆'.repeat(5-Math.floor(n));
const prest = id => getPrestById(id);
const now = () => new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});

const MAX_MESSAGE_LENGTH = 1000;
const MAX_UPLOAD_SIZE = 3 * 1024 * 1024;
const ALLOWED_IMAGE_TYPES = ['image/jpeg','image/png','image/webp'];

function inferCategoryFromMetier(text){
  const t = String(text || '').toLowerCase();
  if(/coiff|esth[eé]t|beaut|ongle|maqu/i.test(t)) return 'beaute';
  if(/m[ée]can|auto|moto|pi[eè]ce|garage/i.test(t)) return 'auto';
  if(/pisc|agri|p[eé]pini|ferme|elev|fruit|plant/i.test(t)) return 'agriculture';
  if(/prof|cours|enseign|math|phys|formation/i.test(t)) return 'education';
  if(/inform|tech|r[eé]seau|ordinateur|pc|phone/i.test(t)) return 'tech';
  if(/livrai|vente|boutique|commerce|quincaill/i.test(t)) return 'commerce';
  if(/plomb|électric|electric|menuis|ma[çc]on|peint|b[âa]t/i.test(t)) return 'batiment';
  if(/photo|vid[eé]o|media/i.test(t)) return 'media';
  if(/couture|mode|styliste/i.test(t)) return 'couture';
  return 'all';
}
function pickEmojiFromMetier(text){
  const t = String(text || '').toLowerCase();
  if(/électric|electric/i.test(t)) return '⚡';
  if(/coiff|esth[eé]t|beaut/i.test(t)) return '💇';
  if(/plomb/i.test(t)) return '🔧';
  if(/prof|cours|enseign/i.test(t)) return '📚';
  if(/pisc/i.test(t)) return '🐟';
  if(/pi[eè]ce|m[ée]can|auto/i.test(t)) return '🔩';
  if(/p[eé]pini|agri|plant/i.test(t)) return '🌱';
  if(/inform|pc|r[eé]seau|tech/i.test(t)) return '💻';
  if(/couture|mode/i.test(t)) return '🧵';
  if(/photo|vid[eé]o/i.test(t)) return '📸';
  return '🧑‍🔧';
}
function pickColorFromText(text){
  const palette = ['#5BB8F5','#F5C842','#FF6B9D','#0ECFC9','#22C55E','#FB923C','#A78BFA','#38BDF8'];
  let sum = 0;
  const s = String(text || '');
  for(let i=0;i<s.length;i++) sum += s.charCodeAt(i);
  return palette[sum % palette.length];
}
function mapUserDocToPrest(doc){
  const d = doc.data ? doc.data() : doc;
  const id = doc.id || d.uid;
  const metier = d.metier || 'Prestataire';
  const nom = d.nom || 'Sans nom';
  return {
    id,
    uid: id,
    nom,
    email: d.email || '',
    role: d.role || 'prestataire',
    metier,
    cat: d.cat || inferCategoryFromMetier(metier),
    ville: d.ville || 'Ville non renseignée',
    note: Number(d.note || 0),
    avis: Number(d.avis || 0),
    tarif: Number(d.tarif || 0),
    unite: d.unite || 'service',
    tags: Array.isArray(d.tags) ? d.tags : [],
    dispo: d.dispo !== false,
    verifie: d.verifie === true || d.verifStatut === 'approuve',
    emoji: d.emoji || pickEmojiFromMetier(metier),
    couleur: d.couleur || pickColorFromText(nom + metier),
    bio: d.bio || 'Prestataire inscrit sur KoneKt.',
    tel: d.tel || '',
    cni: d.cni || '',
    photoBase64: d.photoBase64 || '',
    selfieBase64: d.selfieBase64 || '',
    verifStatut: d.verifStatut || 'non_soumis'
  };
}
function getPrestById(id){
  return PRESTS.find(p => String(p.id) === String(id) || String(p.uid) === String(id));
}
function safeDateLabel(date){
  if(!date) return '';
  try{
    const d = date.toDate ? date.toDate() : new Date(date);
    return d.toLocaleDateString('fr-FR');
  }catch(e){ return ''; }
}
function safeTimeLabel(date){
  if(!date) return '';
  try{
    const d = date.toDate ? date.toDate() : new Date(date);
    return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  }catch(e){ return ''; }
}
function cleanupRealtimeListeners(){
  if(PRESTS_UNSUB){ try{ PRESTS_UNSUB(); }catch(e){} PRESTS_UNSUB = null; }
  if(CONVS_UNSUB){ try{ CONVS_UNSUB(); }catch(e){} CONVS_UNSUB = null; }
  if(CHAT_UNSUB){ try{ CHAT_UNSUB(); }catch(e){} CHAT_UNSUB = null; }
  if(ADMIN_VERIFS_UNSUB){ try{ ADMIN_VERIFS_UNSUB(); }catch(e){} ADMIN_VERIFS_UNSUB = null; }
  if(CMDS_UNSUB){ try{ CMDS_UNSUB(); }catch(e){} CMDS_UNSUB = null; }
  if(PRODUCTS_UNSUB){ try{ PRODUCTS_UNSUB(); }catch(e){} PRODUCTS_UNSUB = null; }
}
function listenPrestataires(){
  if(PRESTS_UNSUB){ try{ PRESTS_UNSUB(); }catch(e){} }
  PRESTS_UNSUB = db.collection('users').where('role','==','prestataire')
    .onSnapshot(function(snap){
      PRESTS = snap.docs.map(mapUserDocToPrest);
      PRESTS_LOADED = true;
      if(STATE.screen === 'app' && STATE.user && STATE.user.role !== 'admin' && STATE.tab === 'home'){
        renderHome();
      }
      if(STATE.screen === 'app' && STATE.user && STATE.user.role === 'admin' && (adminTab === 'verifs' || adminTab === 'home' || adminTab === 'val')){
        renderAdmin();
      }
    }, function(error){
      console.error('Erreur chargement prestataires', error);
      PRESTS_LOADED = true;
    });
}
function getConversationPartnerId(cv){
  if(!STATE.user) return null;
  if(cv.prestataireId && String(cv.prestataireId) !== String(STATE.user.uid)) return cv.prestataireId;
  if(cv.visiteurId && String(cv.visiteurId) !== String(STATE.user.uid)) return cv.visiteurId;
  const arr = Array.isArray(cv.participantIds) ? cv.participantIds : [];
  return arr.find(id => String(id) !== String(STATE.user.uid)) || null;
}
function listenConversations(){
  if(!STATE.user) return;
  if(CONVS_UNSUB){ try{ CONVS_UNSUB(); }catch(e){} }
  CONVS_UNSUB = db.collection('conversations')
    .where('participantIds','array-contains', STATE.user.uid)
    .orderBy('updatedLe','desc')
    .onSnapshot(function(snap){
      CONVS = snap.docs.map(function(doc){
        const d = doc.data() || {};
        return {
          id: doc.id,
          ...d,
          nonLus: Number((d.unreadCounts && d.unreadCounts[STATE.user.uid]) || 0),
          msgs: Array.isArray(d.msgs) ? d.msgs : []
        };
      });
      if(STATE.screen === 'app' && STATE.tab === 'msgs' && !selConvId){
        renderMsgList();
      }
    }, function(error){
      console.error('Erreur chargement conversations', error);
    });
}
function subscribeChatMessages(convId){
  if(CHAT_UNSUB){ try{ CHAT_UNSUB(); }catch(e){} }
  CHAT_UNSUB = db.collection('conversations').doc(convId).collection('messages')
    .orderBy('creeLe','asc')
    .onSnapshot(function(snap){
      const idx = CONVS.findIndex(c => c.id === convId);
      const msgs = snap.docs.map(function(doc){
        const d = doc.data() || {};
        return {
          id: doc.id,
          from: d.senderId === STATE.user.uid ? 'me' : 'them',
          text: d.text || '',
          time: safeTimeLabel(d.creeLe),
          date: safeDateLabel(d.creeLe),
          senderId: d.senderId || '',
          creeLe: d.creeLe || null
        };
      });
      if(idx >= 0) CONVS[idx].msgs = msgs;
      if(selConvId === convId && STATE.tab === 'msgs') renderChat();
    }, function(error){
      console.error('Erreur chargement messages', error);
    });
}

function listenCommandes(){
  if(!STATE.user) return;
  if(CMDS_UNSUB){ try{ CMDS_UNSUB(); }catch(e){} }
  CMDS_UNSUB = db.collection('commandes')
    .where('participantIds','array-contains', STATE.user.uid)
    .onSnapshot(function(snap){
      CMDS = snap.docs.map(function(doc){
        const d = doc.data() || {};
        return { id: doc.id, ...d };
      }).sort(function(a,b){
        const ta = a.creeLe && a.creeLe.toMillis ? a.creeLe.toMillis() : 0;
        const tb = b.creeLe && b.creeLe.toMillis ? b.creeLe.toMillis() : 0;
        return tb - ta;
      });
      if(STATE.screen==='app' && STATE.tab==='cmds'){
        if(selCmdId) renderCmdDetail(); else renderCmdList();
      }
    }, function(error){ console.error('Erreur chargement commandes', error); });
}
function listenProducts(){
  if(PRODUCTS_UNSUB){ try{ PRODUCTS_UNSUB(); }catch(e){} }
  PRODUCTS_UNSUB = db.collection('products')
    .onSnapshot(function(snap){
      PRODUCTS = snap.docs.map(function(doc){
        const d = doc.data() || {};
        return { id: doc.id, ...d };
      }).sort(function(a,b){
        const ta = a.creeLe && a.creeLe.toMillis ? a.creeLe.toMillis() : 0;
        const tb = b.creeLe && b.creeLe.toMillis ? b.creeLe.toMillis() : 0;
        return tb - ta;
      });
      if(STATE.screen==='app'){
        if(STATE.tab==='home' && STATE.user && STATE.user.role==='visiteur' && STATE.selPrest) renderPrestDetail();
        if(STATE.tab==='profile' && STATE.user && STATE.user.role==='prestataire') renderProfile();
      }
    }, function(error){ console.error('Erreur chargement produits', error); });
}
function subscribeAppDataForCurrentUser(){
  if(!STATE.user) return;
  try{ listenPrestataires(); }catch(e){ console.error('listenPrestataires', e); }
  try{ listenConversations(); }catch(e){ console.error('listenConversations', e); }
  try{ listenCommandes(); }catch(e){ console.error('listenCommandes', e); }
  try{ listenProducts(); }catch(e){ console.error('listenProducts', e); }
}

async function ensureConversationWithPrestataire(prestId){
  if(!STATE.user) throw new Error('Utilisateur non connecté');
  const myRole = STATE.user.role || 'visiteur';
  const prestataireId = myRole === 'prestataire' ? STATE.user.uid : prestId;
  const visiteurId = myRole === 'visiteur' ? STATE.user.uid : prestId;
  const convId = [prestataireId, visiteurId].sort().join('_');
  const ref = db.collection('conversations').doc(convId);
  const snap = await ref.get();
  if(!snap.exists){
    await ref.set({
      participantIds: [prestataireId, visiteurId],
      participantRoles: {
        [prestataireId]: 'prestataire',
        [visiteurId]: 'visiteur'
      },
      prestataireId,
      visiteurId,
      createdBy: STATE.user.uid,
      createdLe: firebase.firestore.FieldValue.serverTimestamp(),
      updatedLe: firebase.firestore.FieldValue.serverTimestamp(),
      lastMessageText: '',
      lastMessageAt: null,
      lastMessageSenderId: null,
      unreadCounts: {
        [prestataireId]: 0,
        [visiteurId]: 0
      },
      statut: 'Nouveau'
    }, {merge:true});
  }
  return convId;
}


function escapeHtml(value){
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function isValidEmail(email){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(email || '').trim());
}

function normalizePhone(phone){
  return String(phone || '').replace(/[^\d+]/g, '').trim();
}

function isValidPhone(phone){
  const cleaned = normalizePhone(phone).replace(/^\+/, '');
  return cleaned.length >= 9 && cleaned.length <= 15;
}

function safeText(value, maxLen){
  return String(value || '').trim().slice(0, maxLen || 255);
}

function showToast(msg, color='#22C55E'){
  const t=$('toast');

function previewPhoto(input, previewId){
  if(!(input.files && input.files[0])) return;
  const file = input.files[0];

  if(!ALLOWED_IMAGE_TYPES.includes(file.type)){
    showToast('Format image non pris en charge. Utilise JPG, PNG ou WEBP.','var(--err)');
    input.value = '';
    return;
  }

  if(file.size > MAX_UPLOAD_SIZE){
    showToast('Image trop lourde. Maximum 3 Mo.','var(--err)');
    input.value = '';
    return;
  }

  const reader = new FileReader();
  reader.onload = e => {
    const prev = document.getElementById(previewId||'photo-preview');
    if(prev) prev.innerHTML = `<img src="${e.target.result}" alt="Aperçu" style="width:80px;height:80px;object-fit:cover;border-radius:10px;margin-bottom:4px"/>`;
    if(previewId==='photo-preview') window._photoBase64 = e.target.result;
    if(previewId==='selfie-preview') window._selfieBase64 = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function submitRegister(role){
  const nom=safeText($('r-nom').value, 80);
  const email=safeText($('r-email').value, 120).toLowerCase();
  const pass=$('r-pass').value.trim();
  if(!nom||!email||!pass){ showToast('Remplis tous les champs obligatoires.','var(--err)'); return; }
  if(!isValidEmail(email)){ showToast('Adresse email invalide.','var(--err)'); return; }
  if(pass.length<6){ showToast('Le mot de passe doit faire au moins 6 caractères.','var(--err)'); return; }
  const btn=$('register-btn');
  if(btn){ btn.textContent='Création en cours...'; btn.disabled=true; }
  try {
    const metier=safeText((($('r-metier')||{}).value||''), 80);
    const ville=safeText((($('r-ville')||{}).value||''), 80);
    const tel=normalizePhone((($('r-tel')||{}).value||''));

    if(role==='prestataire'){
      if(!metier || !ville || !tel){
        showToast('Complète métier, ville et téléphone.','var(--err)');
        if(btn){ btn.textContent='Créer mon profil prestataire'; btn.disabled=false; }
        return;
      }
      if(!isValidPhone(tel)){
        showToast('Numéro de téléphone invalide.','var(--err)');
        if(btn){ btn.textContent='Créer mon profil prestataire'; btn.disabled=false; }
        return;
      }
    }

    // Vérification identité
    let verifStatut='non_soumis';
    let cni='';
    let photoVerif=false;
    if(role==='prestataire'){
      const cniEl=$('r-cni');
      const photoEl=$('r-photo');
      if(cniEl && cniEl.value.trim()){
        cni=cniEl.value.trim();
        verifStatut='en_attente'; // sera validé par admin
      } else if(photoEl && photoEl.files && photoEl.files[0]){
        photoVerif=true;
        verifStatut='en_attente';
      }
      // Store photos in sessionStorage for admin review
      if(window._photoBase64) sessionStorage.setItem('verif_photo_'+encodeURIComponent(email), window._photoBase64);
      if(window._selfieBase64) sessionStorage.setItem('verif_selfie_'+encodeURIComponent(email), window._selfieBase64);
    }

      const user = await window.FB.fbRegister(email, pass, role, nom, {
        metier, ville, tel, cni, verifStatut,
        photoBase64: window._photoBase64||'',
        selfieBase64: window._selfieBase64||'',
        portal: role,
        bio: role === 'prestataire' ? 'Nouveau prestataire sur KoneKt.' : '',
        cat: role === 'prestataire' ? inferCategoryFromMetier(metier) : 'all',
        emoji: role === 'prestataire' ? pickEmojiFromMetier(metier) : '👤',
        couleur: pickColorFromText(nom + (metier||'')),
        dispo: role === 'prestataire',
        verifie: false,
        note: 0,
        avis: 0,
        tags: []
      });
      window._photoBase64 = null;
      window._selfieBase64 = null;
    STATE.user = { uid:user.uid, email, role, nom, metier, ville, tel, verifStatut };
    STATE.screen='app';
    STATE.tab='home';
    if(verifStatut==='en_attente'){
      showToast('✅ Compte créé ! Vérification en cours 🛡️');
    } else {
      showToast(`✅ Bienvenue ${nom} !`);
    }
    render();
  } catch(e) {
    let msg = 'Erreur lors de la création du compte.';
    if(e.code==='auth/email-already-in-use') msg='Cet email est déjà utilisé.';
    if(e.code==='auth/invalid-email') msg='Email invalide.';
    if(e.code==='auth/weak-password') msg='Mot de passe trop faible.';
    showToast(msg,'var(--err)');
    if(btn){ btn.textContent=role==='prestataire'?'Créer mon profil prestataire':'Créer mon compte'; btn.disabled=false; }
  }
}

            `<button onclick="pinKey('${k}')" style="height:58px;border-radius:13px;background:var(--card);border:1.5px solid var(--border);color:${k==='⌫'?'var(--err)':'var(--text)'};font-size:${k==='⌫'?'20':'22'}px;font-weight:700">${k}</button>`
          ).join('')}
        </div>
        <button class="btn-ghost" onclick="closePin()">Annuler</button>
      </div>

  renderPinDots();
}

function renderPinDots(){
  const d=$('pin-dots');
  if(!d) return;
  d.innerHTML=[0,1,2,3].map(i=>`
    <div style="width:18px;height:18px;border-radius:50%;background:${i<pinVal.length?(pinError?'var(--err)':'var(--gold)'):'var(--border)'};border:2px solid ${i<pinVal.length?(pinError?'var(--err)':'var(--gold)'):'var(--border)'};transition:all .2s;transform:${i<pinVal.length?'scale(1.15)':'scale(1)'}"></div>
  `).join('');
}

function pinKey(k){
  if(k==='⌫'){ pinVal=pinVal.slice(0,-1); pinError=false; $('pin-error').style.display='none'; renderPinDots(); return; }
  if(pinVal.length>=4) return;
  pinVal+=k;
  renderPinDots();
  if(pinVal.length===4){
    if(pinVal===ADMIN_PIN){
      setTimeout(()=>{ closePin(); goRegister('admin'); },300);
    } else {
      pinError=true; renderPinDots();
      $('pin-error').style.display='block';
      const box=$('pin-box'); box.style.animation='shakeX .6s ease';
      setTimeout(()=>{ pinVal=''; pinError=false; renderPinDots(); $('pin-error').style.display='none'; box.style.animation=''; },700);
    }
  }
}

function closePin(){ const m=$('pin-modal'); if(m) m.remove(); }

async function loadCurrentUserProfileAndEnterApp(user){
  if(!user) return;
  const ref = db.collection('users').doc(user.uid);
  let data = null;
  try{
    const snap = await ref.get();
    if(!snap.exists){
      data = { email: user.email || '', role: 'visiteur', nom: (user.email||'').split('@')[0] || 'Utilisateur', creeLe: firebase.firestore.FieldValue.serverTimestamp() };
      await ref.set(data, { merge: true });
    } else {
      data = snap.data() || {};
    }
  } catch(e){
    console.warn('Chargement profil impossible, mode dégradé', e);
    data = { email: user.email || '', role: 'visiteur', nom: (user.email||'').split('@')[0] || 'Utilisateur' };
  }
  STATE.user = { uid: user.uid, email: user.email || '', ...(data||{}) };
  STATE.screen = 'app';
  STATE.tab = STATE.user.role === 'admin' ? 'admin' : 'home';
  subscribeAppDataForCurrentUser();
  render();
}

async function doLogin(){
  const email=$('l-email').value.trim();
  const pass=$('l-pass').value.trim();
  if(!email||!pass){ showToast('Remplis tous les champs.','#EF4444'); return; }
  const btn=document.querySelector('#login-screen .btn-primary');
  if(btn){ btn.textContent='Connexion...'; btn.disabled=true; }
  try {
    const cred = await auth.signInWithEmailAndPassword(email, pass);
    await loadCurrentUserProfileAndEnterApp(cred.user);
    showToast('Connexion réussie');
  } catch(e) {
    console.error('Erreur connexion', e);
    let msg = 'Une erreur est survenue. Réessaie.';
    if(e.code==='auth/user-not-found'||e.code==='auth/invalid-credential') msg='Aucun compte avec cet email.';
    if(e.code==='auth/wrong-password') msg='Mot de passe incorrect.';
    if(e.code==='auth/invalid-email') msg='Email invalide.';
    if(e.code==='auth/too-many-requests') msg='Trop de tentatives. Réessaie dans quelques minutes.';
    if(e.code==='auth/network-request-failed') msg='Problème de connexion internet.';
    if(e.code==='auth/operation-not-allowed') msg='Connexion par email/mot de passe non activée dans Firebase Auth.';
    showToast(msg,'var(--err)');
  } finally {
    if(btn){ btn.textContent='Se connecter'; btn.disabled=false; }
  }
}

function setCat(c){ activeCat=c; renderHome(); }
function doSearch(v){
  searchVal=v;
  // Only update the results, not the whole page (prevents cursor jumping)
  const filtered = PRESTS.filter(p=>{
    const term = searchVal.toLowerCase();
    const catOk = activeCat==='all' || p.cat===activeCat || inferCategoryFromMetier(p.metier)===activeCat;
    const searchOk = !term || p.nom.toLowerCase().includes(term) || p.metier.toLowerCase().includes(term) || p.ville.toLowerCase().includes(term) || (p.tags||[]).some(t=>String(t).toLowerCase().includes(term));
    const visible = !STATE.user || STATE.user.role==='admin' ? true : String(p.id)!==String(STATE.user.uid);
    return catOk && searchOk && visible;
  });
  const listEl = document.getElementById('prest-list');
  if(listEl){
    if(filtered.length===0){
      listEl.innerHTML=`<div style="text-align:center;padding:60px 20px"><div style="font-size:56px;margin-bottom:12px">🔍</div><div style="font-weight:800;font-size:18px;color:var(--text)">Aucun résultat</div><div style="color:var(--muted);font-size:14px;margin-top:6px">Essaie un autre mot-clé</div></div>`;
    } else {
      listEl.innerHTML = filtered.map((p,i)=>prestCard(p,i)).join('');
    }
    // Update count
    const countEl = document.getElementById('prest-count');
    if(countEl) countEl.textContent = filtered.length + ' prestataire' + (filtered.length>1?'s':'');
    const dispoEl = document.getElementById('prest-dispo');
    if(dispoEl) dispoEl.textContent = filtered.filter(p=>p.dispo).length + ' disponible' + (filtered.filter(p=>p.dispo).length>1?'s':'');
  } else {
    renderHome();
    // Restore focus after full re-render
    const inp = document.getElementById('search-inp');
    if(inp){ inp.focus(); inp.setSelectionRange(v.length, v.length); }
  }
  // Show/hide clear button
  const clearBtn = document.getElementById('search-clear');
  if(clearBtn) clearBtn.style.display = v ? 'block' : 'none';
}
function selPrest(id){ STATE.selPrest=PRESTS.find(p=>p.id===id); renderHome(); }

function chatEnter(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); } }

async function sendMsg(){
  var inp = $('chat-inp');
  if(!inp) return;
  var txtMsg = safeText(inp.value, MAX_MESSAGE_LENGTH);
  if(!txtMsg) return;
  inp.value = '';
  try{
    const cv = CONVS.find(function(c){ return c.id == selConvId; });
    if(!cv){ showToast('Conversation introuvable','var(--err)'); return; }
    const receiverId = getConversationPartnerId(cv);
    await window.FB.fbSaveMsg(String(selConvId), {
      text: txtMsg,
      senderId: STATE.user.uid,
      senderNom: safeText((STATE.user && STATE.user.nom) || 'Moi', 80),
      receiverId: receiverId || ''
    });
    await db.collection('conversations').doc(String(selConvId)).set({
      unreadCounts: { [STATE.user.uid]: 0, [receiverId]: Number((cv.unreadCounts && cv.unreadCounts[receiverId]) || 0) + 1 },
      lastMessageText: txtMsg,
      lastMessageSenderId: STATE.user.uid,
      lastMessageAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedLe: firebase.firestore.FieldValue.serverTimestamp()
    }, {merge:true});
  }catch(e){
    console.error(e);
    showToast('Erreur lors de l\'envoi du message.','var(--err)');
  }
}

function renderCmdList(){
  const actives=CMDS.filter(c=>['en_attente','confirme','en_cours'].includes(c.statut));
  const terminees=CMDS.filter(c=>['termine','annule'].includes(c.statut));
  const cmdTab=window._cmdTab||'active';
  const list=cmdTab==='active'?actives:terminees;
  const cards=list.map((cmd,i)=>{
    const p=prest(cmd.prestId); if(!p) return '';
    const st=STATUTS[cmd.statut];
    return `<div onclick="openCmd('${cmd.id}')" style="background:var(--card);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;animation:fadeUp .4s ease ${i*.06}s both;margin-bottom:11px">
      <div style="background:${p.couleur}14;padding:12px 14px;display:flex;gap:11px;align-items:center">
        <div class="avatar" style="width:40px;height:40px;background:${p.couleur}22;border:1.5px solid ${p.couleur}55;font-size:20px">${p.emoji}</div>
        <div style="flex:1"><div style="font-weight:800;font-size:14px">${p.nom}</div><div style="font-size:11px;color:var(--muted)">${cmd.id}</div></div>
        <span style="background:${st.color}22;color:${st.color};font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px">${st.icon} ${st.label}</span>
      </div>
      <div style="padding:11px 14px">
        <div style="font-weight:600;font-size:13px;margin-bottom:7px">${cmd.service}</div>
        <div style="display:flex;justify-content:space-between">
          <div style="display:flex;gap:12px"><span style="font-size:11px;color:var(--muted)">📅 ${new Date(cmd.date).toLocaleDateString('fr-FR')}</span><span style="font-size:11px;color:var(--muted)">🕐 ${cmd.heure}</span></div>
          <span style="font-weight:800;color:var(--accent);font-size:14px">${fmt(cmd.total)}</span>
        </div>
      </div>
    </div>`;
  }).join('');
  s(`<div style="padding-bottom:80px">
    <div style="padding:18px 16px 0;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;backdrop-filter:blur(12px)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <h2 style="font-size:20px;font-weight:800">Mes commandes</h2>
        <button onclick="openNewOrder()" style="background:linear-gradient(135deg,var(--accent),var(--accl));border:none;border-radius:11px;color:#fff;padding:9px 14px;font-weight:700;font-size:12px;box-shadow:0 4px 14px #FF6B2B44">+ Nouvelle</button>
      </div>
      <div style="display:flex">
        <button onclick="setCmdTab('active')" style="flex:1;padding:11px;border:none;border-bottom:2.5px solid ${cmdTab==='active'?'var(--accent)':'transparent'};background:transparent;color:${cmdTab==='active'?'var(--accent)':'var(--muted)'};font-weight:700;font-size:13px">En cours (${actives.length})</button>
        <button onclick="setCmdTab('done')" style="flex:1;padding:11px;border:none;border-bottom:2.5px solid ${cmdTab==='done'?'var(--accent)':'transparent'};background:transparent;color:${cmdTab==='done'?'var(--accent)':'var(--muted)'};font-weight:700;font-size:13px">Terminées (${terminees.length})</button>
      </div>
    </div>
    <div style="padding:14px 14px">
      ${list.length===0?`<div style="text-align:center;padding:50px 0"><div style="font-size:56px;margin-bottom:12px">📋</div><div style="font-weight:700;margin-bottom:6px">Aucune commande</div><button class="btn btn-primary" onclick="openNewOrder()" style="margin-top:14px">+ Nouvelle commande</button></div>`:cards}
    </div>
  </div>`);
}

function setCmdTab(t){ window._cmdTab=t; renderCmdList(); }
function openCmd(id){ selCmdId=id; renderCmdDetail(); }

function renderCmdDetail(){
  const cmd=CMDS.find(c=>c.id===selCmdId); if(!cmd) return;
  const p=prest(cmd.prestId); if(!p) return;
  const st=STATUTS[cmd.statut];
  const tl=[
    {l:"Commande envoyée",done:true},
    {l:"Acceptée par le prestataire",done:['confirme','en_cours','termine'].includes(cmd.statut)},
    {l:"Intervention en cours",done:['en_cours','termine'].includes(cmd.statut)},
    {l:"Prestation terminée",done:cmd.statut==='termine'},
  ];
  s(`<div style="padding-bottom:80px;animation:fadeUp .3s ease">
    <div style="background:linear-gradient(180deg,${p.couleur}12,var(--bg));padding:18px 16px 22px;border-bottom:1px solid var(--border)">
      <button onclick="selCmdId=null;renderCmdList()" style="background:var(--card);border:none;border-radius:10px;color:var(--text);width:36px;height:36px;font-size:18px;display:flex;align-items:center;justify-content:center;margin-bottom:14px">←</button>
      <div style="display:flex;gap:13px;align-items:center;margin-bottom:13px">
        <div class="avatar" style="width:54px;height:54px;background:${p.couleur}22;border:2px solid ${p.couleur}55;font-size:26px">${p.emoji}</div>
        <div><div style="font-weight:800;font-size:17px">${p.nom}</div><div style="color:${p.couleur};font-weight:600;font-size:13px">${p.metier}</div></div>
      </div>
      <span style="background:${st.color}22;color:${st.color};font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px">${st.icon} ${st.label}</span>
    </div>
    <div style="padding:16px">
      <div style="background:var(--sand);border-radius:14px;overflow:hidden;border:1px solid var(--border);margin-bottom:14px">
        ${[{i:"🛠️",l:"Service",v:cmd.service},{i:"📍",l:"Adresse",v:cmd.adresse},{i:"📅",l:"Date",v:`${new Date(cmd.date).toLocaleDateString('fr-FR')} à ${cmd.heure}`},{i:"💰",l:"Total",v:fmt(cmd.total)}].map((r,i,arr)=>`<div style="display:flex;gap:13px;padding:12px 14px;${i<arr.length-1?'border-bottom:1px solid var(--border)':''}"><span style="font-size:18px">${r.i}</span><div><div style="font-size:10px;color:var(--muted);font-weight:700">${r.l}</div><div style="font-size:13px;font-weight:${r.l==='Total'?800:400};color:${r.l==='Total'?'var(--accent)':'var(--text)'}">${r.v}</div></div></div>`).join('')}
      </div>
      <div style="background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:16px;border:1px solid var(--border);margin-bottom:14px">
        <div class="stitle">Suivi de la commande</div>
        ${tl.map((t,i)=>`
          <div style="display:flex;gap:12px;align-items:flex-start;${i<tl.length-1?'margin-bottom:16px':''}">
            <div style="display:flex;flex-direction:column;align-items:center">
              <div style="width:26px;height:26px;border-radius:50%;background:${t.done?'#22C55E33':'var(--border)'};border:2px solid ${t.done?'var(--ok)':'var(--border)'};display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0">${t.done?'✓':''}</div>
              ${i<tl.length-1?`<div style="width:2px;height:18px;background:${t.done?'#22C55E55':'var(--border)'};margin-top:3px"></div>`:''}
            </div>
            <div style="padding-top:3px;font-size:13px;font-weight:${t.done?700:400};color:${t.done?'var(--text)':'var(--muted)'}">${t.l}</div>
          </div>`).join('')}
      </div>
      <div style="display:flex;flex-direction:column;gap:9px">
        ${STATE.user && STATE.user.role==='prestataire' && cmd.statut==='en_attente'?`<button class="btn btn-primary" onclick="updateCmdStatus('${cmd.id}','confirme')">✅ Confirmer la commande</button>`:''}
        ${STATE.user && STATE.user.role==='prestataire' && ['confirme'].includes(cmd.statut)?`<button class="btn btn-primary" onclick="updateCmdStatus('${cmd.id}','en_cours')">🚚 Démarrer la prestation</button>`:''}
        ${STATE.user && STATE.user.role==='prestataire' && ['en_cours','confirme'].includes(cmd.statut)?`<button class="btn btn-success" onclick="updateCmdStatus('${cmd.id}','termine')">🎉 Marquer comme terminée</button>`:''}
        ${STATE.user && STATE.user.role!=='prestataire' && cmd.statut==='termine'?`<button class="btn btn-primary" onclick="openReview('${cmd.id}')">⭐ Évaluer la prestation</button>`:''}
        ${STATE.user && STATE.user.role!=='prestataire' && ['confirme','en_attente'].includes(cmd.statut)?`<button class="btn btn-danger" onclick="cancelCmd('${cmd.id}')">Annuler la commande</button>`:''}
        <button class="btn btn-outline" onclick="goTabMsg('${p.id}')">💬 Contacter le prestataire</button>
      </div>
    </div>
  </div>`);
}

async function cancelCmd(id){
  try{
    await db.collection('commandes').doc(String(id)).set({statut:'annule'},{merge:true});
    selCmdId=null; renderCmdList();
    showToast('Commande annulée.','#EF4444');
  }catch(e){
    showToast("Impossible d'annuler cette commande.",'var(--err)');
  }
}

// ══════════════════════════════════════════════
//  NOUVELLE COMMANDE
// ══════════════════════════════════════════════
function openNewOrder(){
  if(!newOrderForm.prestId){ newOrderStep=0; newOrderForm={prestId:null,service:"",adresse:"",date:"",heure:"08:00",duree:1}; }
  renderNewOrderModal();
}

function renderNewOrderModal(){
  const existing=$('new-order-modal'); if(existing) existing.remove();
  const p=newOrderForm.prestId?PRESTS.find(x=>x.id===newOrderForm.prestId):null;
  const total=p&&p.tarif?p.tarif*newOrderForm.duree:0;
  const steps=['Prestataire','Détails','Planning'];
  const stepBar=steps.map((st,i)=>`<div style="flex:1"><div style="height:3px;border-radius:2px;background:${i<=newOrderStep?'var(--accent)':'var(--border)'}"></div><div style="font-size:9px;color:${i<=newOrderStep?'var(--accent)':'var(--muted)'};margin-top:3px;font-weight:700">${st}</div></div>`).join('');
  let body='';
  if(newOrderStep===0){
    body=PRESTS.map(pr=>`
      <div onclick="pickPrest(${JSON.stringify(String(pr.id))})" style="background:${newOrderForm.prestId===pr.id?pr.couleur+'18':'var(--card)'};border:1.5px solid ${newOrderForm.prestId===pr.id?pr.couleur:'var(--border)'};border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:9px">
        <div class="avatar" style="width:44px;height:44px;background:${pr.couleur}22;border:1.5px solid ${pr.couleur}55;font-size:20px">${pr.emoji}</div>
        <div style="flex:1"><div style="font-weight:700;font-size:14px">${pr.nom}</div><div style="color:${pr.couleur};font-size:12px">${pr.metier} · ${pr.ville}</div></div>
        <div style="text-align:right"><div style="font-weight:800;color:var(--accent);font-size:13px">${pr.tarif?`${pr.tarif.toLocaleString()} F`:'Devis'}</div><div style="font-size:10px;color:var(--muted)">/${pr.unite}</div></div>
      </div>`).join('');
  } else if(newOrderStep===1){
    body=`
      <div class="input-wrap"><label>Décrivez votre besoin *</label><div class="input-field"><input id="of-service" value="${newOrderForm.service}" oninput="newOrderForm.service=this.value" placeholder="Ex: Réparation fuite cuisine"/></div></div>
      <div class="input-wrap"><label>Adresse d'intervention *</label><div class="input-field"><input id="of-adresse" value="${newOrderForm.adresse}" oninput="newOrderForm.adresse=this.value" placeholder="Quartier, ville"/></div></div>`;
  } else {
    const hours=Array.from({length:13},(_,i)=>`${String(i+7).padStart(2,'0')}:00`);
    body=`
      <div class="input-wrap"><label>Date *</label><div class="input-field"><input type="date" id="of-date" value="${newOrderForm.date}" oninput="newOrderForm.date=this.value" min="2026-03-02"/></div></div>
      <div style="margin-bottom:14px"><label style="font-size:12px;color:var(--muted);font-weight:700;display:block;margin-bottom:8px">Heure de début *</label>
      <div style="display:flex;flex-wrap:wrap;gap:7px">${hours.map(h=>`<button onclick="newOrderForm.heure='${h}';renderNewOrderModal()" style="padding:7px 12px;border-radius:9px;border:1.5px solid ${newOrderForm.heure===h?'var(--accent)':'var(--border)'};background:${newOrderForm.heure===h?'#FF6B2B22':'var(--card)'};color:${newOrderForm.heure===h?'var(--accent)':'var(--muted)'};font-size:12px;font-weight:700">${h}</button>`).join('')}</div></div>
      <div style="margin-bottom:14px"><label style="font-size:12px;color:var(--muted);font-weight:700;display:block;margin-bottom:8px">Durée estimée</label>
      <div style="display:flex;align-items:center;gap:14px">
        <button onclick="newOrderForm.duree=Math.max(1,newOrderForm.duree-1);renderNewOrderModal()" style="width:38px;height:38px;border-radius:11px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:20px">−</button>
        <div style="flex:1;text-align:center"><span style="font-size:26px;font-weight:800">${newOrderForm.duree}</span><span style="color:var(--muted);margin-left:5px">h</span></div>
        <button onclick="newOrderForm.duree++;renderNewOrderModal()" style="width:38px;height:38px;border-radius:11px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:20px">+</button>
      </div></div>
      ${p&&p.tarif>0?`<div style="background:#FF6B2B18;border:1.5px solid #FF6B2B44;border-radius:13px;padding:13px 14px"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="color:var(--muted);font-size:13px">${p.tarif.toLocaleString()} × ${newOrderForm.duree}h</span><span style="font-weight:700">${total.toLocaleString()} F</span></div><div style="display:flex;justify-content:space-between;border-top:1px solid #FF6B2B33;padding-top:9px;margin-top:5px"><span style="font-weight:800">Total estimé</span><span style="font-weight:800;font-size:17px;color:var(--accent)">${total.toLocaleString()} FCFA</span></div></div>`:''}`;
  }
  const canNext=[newOrderForm.prestId, newOrderForm.service&&newOrderForm.adresse, newOrderForm.date][newOrderStep];
  document.body.insertAdjacentHTML('beforeend',`
    <div class="modal-overlay" id="new-order-modal">
      <div class="modal-sheet" style="padding:0">
        <div style="padding:18px 18px 0;position:sticky;top:0;background:var(--bg);z-index:1">
          <div style="display:flex;justify-content:space-between;margin-bottom:14px">
            <h2 style="font-size:17px;font-weight:800">Nouvelle commande</h2>
            <button onclick="closeNewOrder()" style="background:var(--card);border:none;border-radius:9px;width:34px;height:34px;color:var(--muted);font-size:16px">✕</button>
          </div>
          <div style="display:flex;gap:5px;margin-bottom:18px">${stepBar}</div>
        </div>
        <div style="padding:0 18px 22px">
          ${body}
          <div style="display:flex;gap:9px;margin-top:18px">
            ${newOrderStep>0?`<button class="btn btn-outline" onclick="newOrderStep--;renderNewOrderModal()" style="flex:1">← Retour</button>`:''}
            ${newOrderStep<2
              ?`<button class="btn btn-primary" onclick="newOrderNext()" style="flex:1;${!canNext?'opacity:.45':''}" ${!canNext?'disabled':''}>Continuer →</button>`
              :`<button class="btn btn-primary" onclick="confirmOrder()" style="flex:1">✅ Confirmer</button>`}
          </div>
        </div>
      </div>
    </div>`);
}

function pickPrest(id){ newOrderForm.prestId=id; renderNewOrderModal(); }
function newOrderNext(){ newOrderStep++; renderNewOrderModal(); }
function closeNewOrder(){ const m=$('new-order-modal'); if(m) m.remove(); }
async function confirmOrder(){
  const p=PRESTS.find(x=>String(x.id)===String(newOrderForm.prestId));
  if(!p || !STATE.user){ showToast('Prestataire introuvable','var(--err)'); return; }
  const total=p&&p.tarif?p.tarif*newOrderForm.duree:0;
  const ref = db.collection('commandes').doc();
  const newCmd={id:ref.id,prestId:p.id,visiteurId:STATE.user.uid,participantIds:[STATE.user.uid,p.id],statut:'en_attente',service:newOrderForm.service,date:newOrderForm.date,heure:newOrderForm.heure,duree:newOrderForm.duree,adresse:newOrderForm.adresse,total,creeLe: firebase.firestore.FieldValue.serverTimestamp()};
  try{
    await ref.set(newCmd);
    closeNewOrder();
    showToast(`✅ Commande envoyée à ${p.nom} !`);
    STATE.tab='cmds';
    renderCmdList();
  }catch(e){
    console.error(e);
    showToast('Erreur lors de la création de la commande','var(--err)');
  }
}

// ══════════════════════════════════════════════
//  REVIEW
// ══════════════════════════════════════════════
function openReview(cmdId){
  reviewNote=0; reviewComment='';
  document.body.insertAdjacentHTML('beforeend',`
    <div class="modal-overlay" id="review-modal">
      <div class="modal-sheet" style="padding:24px">
        <div style="display:flex;justify-content:space-between;margin-bottom:18px">
          <h2 style="font-size:17px;font-weight:800">Évaluer la prestation</h2>
          <button onclick="document.getElementById('review-modal').remove()" style="background:var(--card);border:none;border-radius:9px;width:34px;height:34px;color:var(--muted);font-size:16px">✕</button>
        </div>
        <div style="text-align:center;margin-bottom:22px">
          <div id="rev-stars" style="display:flex;justify-content:center;gap:10px;margin-bottom:10px">
            ${[1,2,3,4,5].map(i=>`<span onclick="setRevNote(${i})" style="font-size:40px;cursor:pointer;color:${i<=reviewNote?'var(--gold)':'var(--border)'};transition:transform .15s;display:inline-block">★</span>`).join('')}
          </div>
          <div id="rev-lbl" style="color:var(--gold);font-weight:700;font-size:13px;min-height:18px">${reviewNote>0?['Mauvais','Passable','Bien','Très bien','Excellent'][reviewNote-1]:''}</div>
        </div>
        <div class="input-wrap"><label>Votre commentaire</label><div class="input-field"><textarea id="rev-comment" placeholder="Partagez votre expérience..." rows="3"></textarea></div></div>
        <button class="btn btn-primary" id="rev-submit" onclick="submitReview('${cmdId}')" style="${reviewNote===0?'opacity:.45':''}">Publier mon évaluation ⭐</button>
      </div>
    </div>`);
}

function setRevNote(n){
  reviewNote=n;
  const lbls=['Mauvais','Passable','Bien','Très bien','Excellent'];
  const starsEl=$('rev-stars');
  if(starsEl) starsEl.innerHTML=[1,2,3,4,5].map(i=>`<span onclick="setRevNote(${i})" style="font-size:40px;cursor:pointer;color:${i<=n?'var(--gold)':'var(--border)'};transition:transform .15s;display:inline-block;transform:${i<=n?'scale(1.2)':'scale(1)'}"">★</span>`).join('');
  const lbl=$('rev-lbl'); if(lbl) lbl.textContent=lbls[n-1];
  const sub=$('rev-submit'); if(sub) sub.style.opacity=n>0?'1':'0.45';
}

function submitReview(cmdId){
  if(reviewNote===0) return;
  const m=$('review-modal'); if(m) m.remove();
  selCmdId=null; showToast('⭐ Merci pour votre évaluation !');
  renderCmdList();
}

function openProductEditor(productId){
  const u = STATE.user || {};
  if(u.role !== 'prestataire'){ showToast('Réservé aux prestataires','var(--err)'); return; }
  const existing = productId ? PRODUCTS.find(function(p){ return String(p.id)===String(productId) && String(p.ownerId)===String(u.uid); }) : null;
  const old = document.getElementById('product-modal');
  if(old) old.remove();
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'product-modal';
  modal.style.cssText = 'align-items:flex-start;padding:0;overflow-y:auto';
  modal.innerHTML = '<div style="background:var(--bg);width:100%;min-height:100%;padding:24px 20px 40px">'
    + '<div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">'
    + '<button id="prod-back" style="background:var(--card);border:none;border-radius:12px;color:var(--text);font-size:18px;width:40px;height:40px;cursor:pointer">←</button>'
    + '<h2 style="font-size:18px;font-weight:800;color:var(--text)">' + (existing ? 'Modifier une publication' : 'Nouvelle publication') + '</h2></div>'
    + '<div class="input-wrap"><label>Titre / nom</label><div class="input-field"><input id="prod-nom" type="text" value="' + escapeHtml(existing && existing.nom || '') + '" placeholder="Ex: Plants de citron, réparation alternateur"/></div></div>'
    + '<div class="input-wrap"><label>Type</label><div class="input-field"><input id="prod-type" type="text" value="' + escapeHtml(existing && existing.type || '') + '" placeholder="Produit, service, réalisation"/></div></div>'
    + '<div class="input-wrap"><label>Prix</label><div class="input-field"><input id="prod-prix" type="number" min="0" value="' + escapeHtml(existing && existing.prix || '') + '" placeholder="Ex: 5000"/></div></div>'
    + '<div class="input-wrap"><label>Description</label><div class="input-field"><textarea id="prod-desc" rows="4" style="width:100%;background:transparent;border:none;color:var(--text);outline:none" placeholder="Décris clairement ce que tu proposes, la qualité, la quantité, la zone...">' + escapeHtml(existing && existing.description || '') + '</textarea></div></div>'
    + '<div class="input-wrap"><label>Commentaire court</label><div class="input-field"><input id="prod-comment" type="text" value="' + escapeHtml(existing && existing.commentaire || '') + '" placeholder="Ex: livraison possible, garantie 3 mois"/></div></div>'
    + '<button id="prod-save" class="btn btn-primary" style="margin-top:16px">' + (existing ? 'Enregistrer les modifications' : 'Publier') + '</button>'
    + '</div>';
  document.body.appendChild(modal);
  document.getElementById('prod-back').addEventListener('click', function(){ modal.remove(); });
  document.getElementById('prod-save').addEventListener('click', async function(){
    const nom = (document.getElementById('prod-nom').value || '').trim();
    if(!nom){ showToast('Le titre est obligatoire','var(--err)'); return; }
    const payload = {
      ownerId: u.uid,
      ownerName: u.nom || '',
      ownerRole: u.role || 'prestataire',
      nom: nom,
      type: (document.getElementById('prod-type').value || '').trim(),
      prix: Number((document.getElementById('prod-prix').value || 0)),
      description: (document.getElementById('prod-desc').value || '').trim(),
      commentaire: (document.getElementById('prod-comment').value || '').trim(),
      updatedLe: firebase.firestore.FieldValue.serverTimestamp()
    };
    try{
      if(existing){
        await db.collection('products').doc(existing.id).set(payload, {merge:true});
        showToast('✅ Publication mise à jour');
      }else{
        payload.creeLe = firebase.firestore.FieldValue.serverTimestamp();
        await db.collection('products').add(payload);
        showToast('✅ Publication ajoutée');
      }
      modal.remove();
      profileSection = 'products';
      renderProfile();
    }catch(e){
      console.error(e);
      showToast('Impossible d’enregistrer la publication','var(--err)');
    }
  });
}

async function deleteProduct(productId){
  const u = STATE.user || {};
  if(u.role !== 'prestataire'){ return; }
  const ok = window.confirm('Supprimer cette publication ?');
  if(!ok) return;
  try{
    await db.collection('products').doc(productId).delete();
    showToast('Publication supprimée');
    profileSection = 'products';
    renderProfile();
  }catch(e){
    console.error(e);
    showToast('Impossible de supprimer','var(--err)');
  }
}

function editProfile(){

    + '<div class="input-wrap"><label>Nom complet</label><div class="input-field"><input id="ep-nom" type="text" value="' + (u.nom||'') + '"/></div></div>'

      + '<div class="input-wrap"><label>Bio</label><div class="input-field"><textarea id="ep-bio" rows="3" style="width:100%;background:transparent;border:none;color:var(--text);outline:none">' + (u.bio||'') + '</textarea></div></div>'

      + '<div class="input-wrap"><label>Unité</label><div class="input-field"><input id="ep-unite" type="text" value="' + (u.unite||'service') + '"/></div></div>'
      + '<div class="input-wrap"><label>Mots-clés</label><div class="input-field"><input id="ep-tags" type="text" value="' + ((u.tags||[]).join(', ')) + '" placeholder="Ex: installation, dépannage, livraison"/></div></div>'
      : '')
    + '<button id="ep-save" class="btn btn-primary" style="margin-top:16px">Enregistrer</button>'
    + '</div>';
  document.body.appendChild(modal);
  document.getElementById('edit-back').addEventListener('click', function(){ modal.remove(); });
  document.getElementById('ep-save').addEventListener('click', function(){
    var nom = document.getElementById('ep-nom').value.trim();
    if(!nom){ showToast('Le nom est obligatoire','var(--err)'); return; }
    var updates = { nom: nom };
    if(u.role==='prestataire'){
      updates.metier = (document.getElementById('ep-metier')||{}).value||u.metier||'';
      updates.ville = (document.getElementById('ep-ville')||{}).value||u.ville||'';
      updates.tel = (document.getElementById('ep-tel')||{}).value||u.tel||'';
      updates.bio = (document.getElementById('ep-bio')||{}).value||u.bio||'';
      updates.tarif = Number((document.getElementById('ep-tarif')||{}).value || 0);
      updates.unite = (document.getElementById('ep-unite')||{}).value||u.unite||'service';
      updates.tags = String((document.getElementById('ep-tags')||{}).value||'').split(',').map(function(t){ return t.trim(); }).filter(Boolean);
    }
    db.collection('users').doc(u.uid).update(updates)
      .then(function(){
        Object.assign(STATE.user, updates);
        showToast('✅ Profil mis à jour !');
        modal.remove();
        renderProfile();
      })
      .catch(function(e){ showToast('Erreur: ' + e.message, 'var(--err)'); });
  });
}

function showSecurityModal(){

  document.getElementById('sec-eye').addEventListener('click', function(){
    var inp = document.getElementById('sec-pass');
    inp.type = inp.type === 'password' ? 'text' : 'password';

  window._pendingVerifs = prests;
  if(prests.length === 0){
    s('<div style="padding:20px 16px 90px;background:var(--bg);min-height:100%"><div style="margin-bottom:20px"><div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Administration</div><h2 style="font-size:22px;font-weight:800;color:var(--text)">Prestataires inscrits 👥</h2></div><div style="text-align:center;padding:40px"><div style="font-size:48px">📭</div><div style="margin-top:12px;color:var(--muted)">Aucun prestataire inscrit</div></div></div>');
    return;
  }
  let html = '<div style="padding:20px 16px 90px;background:var(--bg);min-height:100%"><div style="margin-bottom:20px"><div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Administration</div><h2 style="font-size:22px;font-weight:800;color:var(--text)">Prestataires inscrits 👥</h2></div>';
  html += '<p style="color:var(--muted);font-size:13px;margin-bottom:16px">' + prests.length + ' prestataire(s) réels</p>';
  prests.forEach(function(v){
    var badge = v.verifie ? '✓ Vérifié' : (v.verifStatut === 'en_attente' ? 'En attente' : 'Non vérifié');
    var badgeBg = v.verifie ? 'rgba(26,138,74,.15)' : 'rgba(212,160,23,.15)';
    var badgeCol = v.verifie ? 'var(--ok)' : 'var(--gold)';
    html += '<div id="card-' + v.id + '" style="background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;cursor:pointer">';
    html += '<div style="display:flex;align-items:center;gap:12px">';
    html += '<div style="width:46px;height:46px;border-radius:12px;background:' + v.couleur + '22;display:flex;align-items:center;justify-content:center;font-size:22px">' + v.emoji + '</div>';
    html += '<div style="flex:1"><div style="font-weight:800;font-size:15px;color:var(--text)">' + escapeHtml(v.nom||'Sans nom') + '</div>';
    html += '<div style="font-size:12px;color:var(--muted);margin-top:2px">' + escapeHtml((v.metier||'Métier non renseigné') + ' · ' + (v.ville||'')) + '</div></div>';
    html += '<div style="font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:' + badgeBg + ';color:' + badgeCol + '">' + badge + '</div>';
    html += '</div><div style="margin-top:8px;font-size:11px;color:var(--accent);font-weight:600">👁️ Voir le dossier →</div></div>';
  });
  html += '</div>';
  s(html);
  prests.forEach(function(v){
    var card = document.getElementById('card-' + v.id);
    if(card) card.addEventListener('click', function(){ showVerifDetail(v.id); });
  });
}

function showVerifDetail(id){
  var vList = window._pendingVerifs || [];
  var v = null;
  for(var i = 0; i < vList.length; i++){ if(vList[i].id === id){ v = vList[i]; break; } }
  if(!v){ showToast('Introuvable','var(--err)'); return; }

  var old = document.getElementById('verif-modal');
  if(old) old.remove();

  var modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'verif-modal';
  modal.style.cssText = 'align-items:flex-start;padding:0;overflow-y:auto';

  var photoHtml = v.photoBase64
    ? '<img src="' + v.photoBase64 + '" style="width:100%;height:100%;object-fit:cover"/>'
    : '<div style="text-align:center;padding:20px"><div style="font-size:36px">📄</div><div style="font-size:10px;color:var(--muted);margin-top:6px">Non soumise</div></div>';

  var selfieHtml = v.selfieBase64
    ? '<img src="' + v.selfieBase64 + '" style="width:100%;height:100%;object-fit:cover"/>'
    : '<div style="text-align:center;padding:20px"><div style="font-size:36px">🤳</div><div style="font-size:10px;color:var(--muted);margin-top:6px">Non soumis</div></div>';

  var inner = '<div style="background:var(--bg);width:100%;min-height:100%;padding:24px 20px 40px">';
  inner += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">';
  inner += '<button id="modal-back" style="background:var(--card);border:none;border-radius:12px;color:var(--text);font-size:18px;width:40px;height:40px;cursor:pointer">←</button>';
  inner += '<h2 style="font-size:18px;font-weight:800;color:var(--text)">Dossier complet</h2></div>';
  inner += '<div style="background:var(--card);border-radius:16px;padding:16px;margin-bottom:16px">';
  inner += '<div style="font-weight:800;font-size:16px;color:var(--text)">' + (v.nom||'Sans nom') + '</div>';
  inner += '<div style="font-size:13px;color:var(--accent);margin-top:4px">' + (v.metier||'Prestataire') + '</div>';
  inner += '<div style="font-size:12px;color:var(--muted);margin-top:4px">' + (v.email||'') + '</div>';
  if(v.cni) inner += '<div style="margin-top:10px;background:var(--bg);border-radius:10px;padding:10px"><div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:4px">CNI / PASSEPORT</div><div style="font-size:15px;font-weight:800;letter-spacing:2px;color:var(--text)">' + v.cni + '</div></div>';
  inner += '</div>';
  inner += '<div style="font-weight:800;font-size:14px;color:var(--text);margin-bottom:12px">📸 Comparaison identité</div>';
  inner += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">';
  inner += '<div><div style="font-size:10px;color:var(--muted);font-weight:700;text-align:center;margin-bottom:8px">PIÈCE</div><div style="background:var(--card);border-radius:14px;overflow:hidden;aspect-ratio:1;display:flex;align-items:center;justify-content:center">' + photoHtml + '</div></div>';
  inner += '<div><div style="font-size:10px;color:var(--muted);font-weight:700;text-align:center;margin-bottom:8px">SELFIE</div><div style="background:var(--card);border-radius:14px;overflow:hidden;aspect-ratio:1;display:flex;align-items:center;justify-content:center">' + selfieHtml + '</div></div>';
  inner += '</div>';
  inner += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';
  inner += '<button id="btn-refuse" style="padding:16px;background:rgba(204,34,34,.1);border:1.5px solid var(--err);border-radius:16px;color:var(--err);font-weight:800;font-size:14px;cursor:pointer">✕ Refuser</button>';
  inner += '<button id="btn-approuve" style="padding:16px;background:linear-gradient(135deg,#1A8A4A,#2952CC);border:none;border-radius:16px;color:#fff;font-weight:800;font-size:14px;cursor:pointer">✓ Approuver</button>';
  inner += '</div></div>';

  modal.innerHTML = inner;
  document.body.appendChild(modal);

  document.getElementById('modal-back').addEventListener('click', function(){ modal.remove(); });
  document.getElementById('btn-refuse').addEventListener('click', function(){ traiterVerif(v.id,'refuse'); modal.remove(); });
  document.getElementById('btn-approuve').addEventListener('click', function(){ traiterVerif(v.id,'approuve'); modal.remove(); });
}


async function traiterVerif(id, action){
  try {
    const userRef = db.collection("users").doc(id);
    await userRef.set({
      verifStatut: action,
      verifie: action === 'approuve'
    }, {merge:true});
    const verifs = await db.collection("verifications").where("uid","==", id).get();
    for(const doc of verifs.docs){
      await doc.ref.set({ verifStatut: action }, {merge:true});
    }
  } catch(e){
    console.error(e);
    showToast('Erreur de mise à jour','var(--err)');
    return;
  }
  showToast(action==='approuve'?'✅ Badge ✓ accordé au prestataire !':'❌ Vérification refusée.', action==='approuve'?'var(--ok)':'var(--err)');
  setTimeout(()=>renderAdmin(), 100);
}

function renderAdminSigs(){
  const gc={haute:{c:'var(--err)'},moyenne:{c:'var(--warn)'},basse:{c:'var(--teal)'}};
  const cards=signals.map((sg,i)=>{
    const g=gc[sg.gravite];
    return `<div style="background:var(--card);border:1.5px solid ${g.c}44;border-radius:14px;overflow:hidden;animation:fadeUp .4s ease ${i*.07}s both;margin-bottom:11px">
      <div style="background:${g.c}18;padding:11px 14px;display:flex;gap:8px;align-items:center">
        <span style="font-size:17px">🚨</span><span style="font-weight:700;color:${g.c};font-size:13px">${sg.type}</span>
        <span style="background:${g.c}22;color:${g.c};font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:capitalize">${sg.gravite}</span>
      </div>
      <div style="padding:12px 14px">
        <div style="font-size:12px;color:var(--muted);margin-bottom:3px">De : <b style="color:var(--text)">${sg.de}</b> · Contre : <b style="color:var(--text)">${sg.contre}</b></div>
        <div style="font-size:13px;background:var(--bg);border-radius:9px;padding:9px 11px;margin:9px 0;line-height:1.5">${sg.desc}</div>
        <div style="display:flex;gap:8px">
          <button style="flex:1;padding:9px;border-radius:9px;background:#EF444422;border:1px solid #EF444444;color:var(--err);font-weight:700;font-size:11px">Suspendre</button>
          <button onclick="closeSig('${sg.id}')" style="flex:1;padding:9px;border-radius:9px;background:var(--card);border:1px solid var(--border);color:var(--muted);font-weight:700;font-size:11px">Clôturer</button>
        </div>
      </div>
    </div>`;
  }).join('');
  s(`<div style="padding:18px 14px 80px">
    <h2 style="font-size:18px;font-weight:800;margin-bottom:6px">Signalements</h2>
    <p style="color:var(--muted);font-size:13px;margin-bottom:18px">${signals.length} signalement${signals.length>1?'s':''} ouvert${signals.length>1?'s':''}</p>
    ${signals.length===0?`<div style="text-align:center;padding:50px 0"><div style="font-size:56px">✅</div><div style="font-weight:700;margin-top:12px">Aucun signalement</div></div>`:cards}
  </div>`);
}

function closeSig(id){
  signals=signals.filter(sg=>sg.id!==id);
  showToast('✅ Signalement clôturé.');
  renderAdmin();
}

// Boot - wrap in try/catch to handle any errors
try {
  var _visited = false;
  try { _visited = !!localStorage.getItem('konekt_visited'); } catch(e){}
  if(_visited){ STATE.screen = 'welcome'; }

  auth.onAuthStateChanged(async function(user){
    if(!user){
      cleanupRealtimeListeners();
      STATE.user = null;
      if(STATE.screen !== 'splash') STATE.screen = 'welcome';
      render();
      return;
    }
    await loadCurrentUserProfileAndEnterApp(user);
  });

  render();
  try { setTimeout(function(){ localStorage.setItem('konekt_visited','1'); }, 3000); } catch(e){}
} catch(err){
  document.body.style.background = '#071428';
  document.body.innerHTML = '<div style="color:#fff;padding:40px;text-align:center"><div style="font-size:48px">⚠️</div><div style="margin-top:16px;font-size:16px">Erreur de démarrage</div><div style="margin-top:8px;font-size:12px;opacity:.7">' + err.message + '</div></div>';
}

// Global click handler for dynamically rendered buttons
document.addEventListener('click', function(e){
  if(e.target && e.target.id === 'go-login-btn'){
    STATE.screen='login'; render();
  }
});

function togglePass(id, btn){
  const inp = document.getElementById(id);
  if(inp.type === 'password'){
    inp.type = 'text';
    btn.innerHTML = '🙈';
  } else {
    inp.type = 'password';
    btn.innerHTML = '👁️';
  }
}
</script>
