<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#071428"/>
<title>KoneKt - Version Réelle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* --- DESIGN KONEKT NIGHT --- */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#071428; --surface:#0D1F35; --card:#0F2040; --card2:#0A1830;
  --accent:#5BB8F5; --accl:#7DCAFF; --gold:#D4A017; --teal:#1A8A4A;
  --text:#FFFFFF; --muted:#6A8AAA; --danger:#FF4C4C; --shadow:0 12px 32px rgba(0,0,0,0.5);
}
body{background:var(--bg);color:var(--text);font-family:'Plus+Jakarta+Sans',sans-serif;overflow-x:hidden;-webkit-user-select:none;user-select:none;}
.screen{min-height:100vh;display:flex;flex-direction:column;position:relative;padding-bottom:100px;animation:fade .4s ease;}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Navigation */
#bottom-nav{position:fixed;bottom:20px;left:20px;right:20px;height:70px;background:rgba(15,32,64,0.85);backdrop-filter:blur(20px);border-radius:24px;border:1px solid rgba(255,255,255,0.08);display:none;align-items:center;justify-content:space-around;z-index:9999;box-shadow:var(--shadow);}
.nav-btn{background:none;border:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:4px;width:25%;transition:0.3s;}
.nav-btn.active{color:var(--accent);transform:scale(1.1);}
.nav-icon{font-size:22px;} .nav-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}

/* Admin & Cards */
.admin-card{background:var(--card);padding:20px;border-radius:20px;border:1px solid var(--accent);margin:15px;box-shadow:var(--shadow);}
.provider-card{background:var(--card);padding:16px;border-radius:24px;margin-bottom:12px;border:1px solid rgba(255,255,255,0.05);transition:0.3s;}
#toast{position:fixed;top:50px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--bg);padding:12px 24px;border-radius:50px;font-weight:800;z-index:10001;display:none;box-shadow:0 8px 24px rgba(91,184,245,0.4);}
.btn-primary{background:var(--accent);color:var(--bg);border:none;padding:14px;border-radius:16px;font-weight:800;width:100%;font-size:15px;cursor:pointer;}
</style>
</head>
<body>

<div id="app">
    <div class="screen" id="screen"></div>
    <nav id="bottom-nav">
        <button class="nav-btn active" id="nav-home" onclick="goTab('home')"><span class="nav-icon">🏠</span><span class="nav-lbl">Accueil</span></button>
        <button class="nav-btn" id="nav-msgs" onclick="goTab('msgs')"><span class="nav-icon">💬</span><span class="nav-lbl">Messages</span></button>
        <button class="nav-btn" id="nav-cmds" onclick="goTab('cmds')"><span class="nav-icon">📦</span><span class="nav-lbl">Commandes</span></button>
        <button class="nav-btn" id="nav-profile" onclick="goTab('profile')"><span class="nav-icon">👤</span><span class="nav-lbl">Admin</span></button>
    </nav>
</div>
<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
/* 1. CONFIGURATION */
const firebaseConfig = {
  apiKey: "AIzaSyCkXKO6i9oOjwJkFqO3QfeucJGc5i5WDbc",
  authDomain: "konekt-788c3.firebaseapp.com",
  projectId: "konekt-788c3",
  storageBucket: "konekt-788c3.firebasestorage.app",
  messagingSenderId: "1044180836092",
  appId: "1:1044180836092:android:30052dbd45705fa42a0179"
};
if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* 2. ETAT GLOBAL (SANS DONNÉES FICTIVES) */
let STATE = {
  screen: 'splash',
  user: null,
  tab: 'home',
  providers: [],
  chats: []
};

/* 3. CHARGEMENT DES DONNÉES RÉELLES */
async function loadRealData() {
    try {
        // On récupère uniquement les prestataires inscrits dans Firestore
        const snap = await db.collection('users').where('isProvider', '==', true).get();
        STATE.providers = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
        
        if(auth.currentUser) {
            const chatSnap = await db.collection('chats')
                .where('participants', 'array-contains', auth.currentUser.uid)
                .onSnapshot(s => {
                    STATE.chats = s.docs.map(d => ({id: d.id, ...d.data()}));
                    render();
                });
        }
        render();
    } catch(e) { console.error(e); }
}

/* 4. LOGIQUE DE NAVIGATION */
function goTab(t){
  STATE.tab = t;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + t).classList.add('active');
  render();
}

function showToast(m){
  const t = document.getElementById('toast');
  t.innerText = m; t.style.display='block';
  setTimeout(()=> t.style.display='none', 2500);
}

/* 5. RENDU DES ÉCRANS */
function render() {
  const root = document.getElementById('screen');
  const nav = document.getElementById('bottom-nav');
  
  // Splash Screen
  if(STATE.screen === 'splash') {
    nav.style.display = 'none';
    root.innerHTML = `
      <div style="height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:40px; text-align:center;">
        <h1 style="font-family:'Clash Display'; font-size:52px; color:var(--accent);">KoneKt</h1>
        <p style="color:var(--muted); margin-top:10px;">Le Cameroun Services Pro</p>
        <button class="btn-primary" onclick="STATE.screen='home'; render();" style="margin-top:50px; width:200px;">ENTRER</button>
      </div>`;
    return;
  }

  nav.style.display = 'flex';

  // Accueil (Liste des Prestataires Réels)
  if(STATE.tab === 'home') {
    root.innerHTML = `
      <div style="padding:20px;">
        <h2 style="font-family:'Clash Display'; font-size:28px;">Découvrir</h2>
        <div style="margin:20px 0; position:relative;">
            <input type="text" placeholder="Rechercher un pro..." style="width:100%; padding:16px; border-radius:16px; border:none; background:var(--surface); color:white;">
        </div>
        <div id="real-list">
            ${STATE.providers.length === 0 ? 
              `<div style="text-align:center; padding:50px; color:var(--muted);">Aucun prestataire inscrit pour le moment.</div>` : 
              STATE.providers.map(p => `
                <div class="provider-card">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div style="width:50px; height:50px; border-radius:12px; background:var(--accent); display:flex; align-items:center; justify-content:center; font-weight:800; color:var(--bg)">${p.name[0]}</div>
                        <div>
                            <div style="font-weight:700;">${p.name}</div>
                            <div style="font-size:12px; color:var(--accent)">${p.category || 'Service'}</div>
                        </div>
                    </div>
                    <button class="btn-primary" style="margin-top:12px; padding:8px; font-size:12px;" onclick="showToast('Connexion au chat...')">Contacter</button>
                </div>
              `).join('')}
        </div>
      </div>`;
  }

  // Admin (Gestion des profils)
  if(STATE.tab === 'profile') {
    root.innerHTML = `
      <div style="padding:20px;">
        <h2 style="font-family:'Clash Display';">Administration</h2>
        <div class="admin-card">
            <small style="color:var(--muted)">PRESTATAIRES INSCRITS</small>
            <div style="font-size:40px; font-weight:800; color:var(--accent)">${STATE.providers.length}</div>
        </div>
        
        <h3 style="margin:20px 0 10px 0;">Profils des membres</h3>
        ${STATE.providers.map(p => `
            <div style="background:var(--surface); padding:15px; border-radius:15px; margin-bottom:10px; border-left:4px solid var(--accent)">
                <div style="font-weight:700;">${p.name}</div>
                <div style="font-size:12px; color:var(--muted)">${p.email}</div>
                <div style="font-size:11px; margin-top:5px; color:var(--gold)">${p.category || 'Non défini'}</div>
            </div>
        `).join('')}
      </div>`;
  }

  // Messages (Réels)
  if(STATE.tab === 'msgs') {
    root.innerHTML = `
      <div style="padding:20px;">
        <h2 style="font-family:'Clash Display';">Messagerie</h2>
        ${STATE.chats.length === 0 ? 
          `<div style="text-align:center; padding:50px; color:var(--muted);">Aucune conversation réelle.</div>` : 
          'Conversations chargées...'}
      </div>`;
  }
}

/* 6. BOOT */
auth.onAuthStateChanged(u => {
    STATE.user = u;
    loadRealData();
});

window.onload = () => render();
</script>
</body>
</html>
