<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  /* KoneKt Night — nuit bleue, vert, bleu ciel, doré */
  --bg:#071428;
  --surface:#0D1F35;
  --card:#0F2040;
  --card2:#0A1830;
  --accent:#5BB8F5;       /* bleu ciel */
  --accl:#7DCAFF;         /* bleu ciel clair */
  --gold:#D4A017;         /* or */
  --teal:#1A8A4A;         /* vert */
  --purple:#2952CC;       /* bleu royal */
  --sand:#0D1F35;         /* surface nuit */
  --sand2:#0F2545;
  --text:#FFFFFF;         /* blanc */
  --text2:#C8DCF0;        /* blanc bleuté */
  --muted:#6A8AAA;        /* bleu gris */
  --border:#1A3A5A;
  --border2:#1F4570;
  --ok:#1A8A4A;
  --warn:#D4A017;
  --err:#E05555;
  --shadow:0 2px 16px rgba(0,10,30,.3);
  --shadow-lg:0 8px 40px rgba(0,10,30,.5);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;overflow:hidden;background:var(--bg);}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.screen::-webkit-scrollbar{display:none;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shakeX{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
@keyframes pulse{0%,100%{opacity:.25;transform:scale(.75)}50%{opacity:1;transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes waxSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.fadeUp{animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both;}

input,textarea,button{font-family:'Plus Jakarta Sans',sans-serif;outline:none;}
button{cursor:pointer;transition:all .18s cubic-bezier(.22,1,.36,1);}
button:active{transform:scale(.93);}
textarea{resize:none;}

/* ── BOTTOM NAV — flottant arrondi ── */
#bottom-nav{
  display:none;flex-shrink:0;
  margin:0 16px 12px;
  background:var(--text);
  border-radius:26px;
  padding:10px 8px max(10px,env(safe-area-inset-bottom));
  box-shadow:0 8px 32px rgba(4,13,26,.28);
}
#bottom-nav.show{display:flex;}
.nav-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 4px;border-radius:18px;position:relative;transition:background .2s;}
.nav-btn.active{background:linear-gradient(135deg,#1A8A4A,#2952CC);}
.nav-btn .nav-icon{font-size:20px;line-height:1;}
.nav-btn .nav-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:.3px;}
.nav-btn.active .nav-lbl{color:#fff;}
.nav-btn .nav-dot{display:none;}
.nav-badge{position:absolute;top:-2px;right:14%;width:15px;height:15px;border-radius:50%;color:#fff;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--text);background:linear-gradient(135deg,#1A8A4A,#2952CC);}

/* ── TOAST ── */
#toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);padding:11px 20px;border-radius:50px;font-weight:700;font-size:13px;z-index:9999;white-space:nowrap;display:none;animation:slideIn .3s ease;color:#fff;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(4,13,26,.5);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:flex-end;justify-content:center;}
.modal-sheet{background:var(--bg);border-radius:28px 28px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;animation:slideUp .35s cubic-bezier(.22,1,.36,1);padding-bottom:env(safe-area-inset-bottom);}
.modal-sheet::-webkit-scrollbar{display:none;}
.modal-handle{width:40px;height:4px;border-radius:2px;background:var(--border2);margin:14px auto 0;}

/* ── CARDS ── */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:18px;box-shadow:var(--shadow);}

/* ── BUTTONS ── */
.btn{border:none;border-radius:16px;font-weight:700;font-size:15px;padding:15px 22px;transition:all .2s;width:100%;}
.btn-primary{background:linear-gradient(135deg,#1A8A4A,#2952CC);color:#fff;box-shadow:0 4px 20px rgba(91,184,245,.35);}
.btn-primary:active{box-shadow:0 2px 8px rgba(91,184,245,.2);}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border2);}
.btn-danger{background:#CC222211;color:var(--err);border:1.5px solid #CC222233;}
.btn-success{background:#1A8A4A11;color:var(--ok);border:1.5px solid #1A8A4A33;}
.btn-ghost{background:transparent;border:none;color:var(--accent);font-weight:700;font-size:14px;padding:8px 0;width:auto;}
.btn-sand{background:var(--sand);color:var(--text);border:none;}

/* ── INPUTS ── */
.input-wrap{margin-bottom:16px;}
.input-wrap label{font-size:12px;color:var(--muted);font-weight:700;display:block;margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px;}
.input-field{display:flex;align-items:center;background:var(--sand);border:1.5px solid transparent;border-radius:14px;padding:0 14px;transition:all .2s;}
.input-field:focus-within{border-color:var(--accent);background:var(--card);box-shadow:0 0 0 4px rgba(91,184,245,.08);}
.input-field input,.input-field textarea{flex:1;background:transparent;border:none;color:var(--text);font-size:14px;padding:13px 0;outline:none;font-family:'Plus Jakarta Sans',sans-serif;}
.input-field textarea{padding:13px 0;min-height:80px;}

/* ── AVATAR ── */
.avatar{border-radius:30%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ── STARS ── */
.stars{color:var(--gold);}

/* ── MISC ── */
.stitle{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.step-dot{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#1A8A4A,#2952CC);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0;}
.step-line{width:2px;background:var(--border);position:absolute;left:17px;top:40px;bottom:0;}
.step-content{flex:1;padding-top:6px;}

/* ── WAX PATTERN (motif décoratif africain) ── */
.wax-bg{
  background-image:
    radial-gradient(circle at 20% 50%, rgba(91,184,245,.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(212,160,23,.08) 0%, transparent 40%),
    radial-gradient(circle at 60% 80%, rgba(26,138,122,.05) 0%, transparent 40%);
}
.wax-chip{
  width:120px;height:120px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  opacity:.07;position:absolute;pointer-events:none;
}
/* ── CHIP TAG ── */
.chip{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;background:var(--sand);color:var(--text2);}
.chip-accent{background:rgba(91,184,245,.12);color:var(--accent);}
.chip-ok{background:rgba(26,138,74,.12);color:var(--ok);}
.chip-err{background:rgba(204,34,34,.1);color:var(--err);}
.chip-gold{background:rgba(212,160,23,.12);color:var(--gold);}
</style>

<script>

// FORCE CLEAR ALL CACHES
try {
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(r){ r.unregister(); });
    });
  }
  if('caches' in window){
    caches.keys().then(function(keys){
      keys.forEach(function(k){ caches.delete(k); });
    });
  }
} catch(e){}

// ══════════════════════════════════════════════
//  FIREBASE CONFIG — konekt-788c3
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey:        "AIzaSyCkXKO6i9oOjwJkFqO3QfeucJGc5i5WDbc",
  authDomain:    "konekt-788c3.firebaseapp.com",
  projectId:     "konekt-788c3",
  storageBucket: "konekt-788c3.firebasestorage.app",
  messagingSenderId: "1044180836092",
  appId:         "1:1044180836092:android:30052dbd45705fa42a0179"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();


window.FB = {
  fbRegister: async (email, password, role, nom, extra={}) => {
    const basePayload = {
      email,
      nom,
      role,
      rolePrincipal: role,
      roles: [role],
      creeLe: firebase.firestore.FieldValue.serverTimestamp(),
      ...extra
    };
    try {
      const cred = await auth.createUserWithEmailAndPassword(email, password);
      await db.collection("users").doc(cred.user.uid).set(basePayload, { merge:true });
      if(role === 'prestataire' && extra.verifStatut === 'en_attente'){
        await db.collection("verifications").add({
          uid: cred.user.uid, nom, email, role,
          cni: extra.cni||'',
          photoBase64: extra.photoBase64||'',
          selfieBase64: extra.selfieBase64||'',
          verifStatut: 'en_attente',
          creeLe: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
      return { user: cred.user, addedRole:false };
    } catch(e) {
      if(e.code !== 'auth/email-already-in-use') throw e;
      // Même email autorisé pour un deuxième profil uniquement si le mot de passe est le même
      const cred = await auth.signInWithEmailAndPassword(email, password);
      const ref = db.collection("users").doc(cred.user.uid);
      const snap = await ref.get();
      const data = snap.exists ? (snap.data() || {}) : {};
      const roles = getUserRoles(data);
      if(roles.includes(role)){
        const err = new Error('Ce profil existe déjà pour cet email.');
        err.code = 'profile/already-exists';
        throw err;
      }
      const updatedRoles = roles.concat([role]).slice(0,2);
      const updates = {
        email,
        nom: data.nom || nom,
        role,
        rolePrincipal: role,
        roles: updatedRoles,
        ...extra
      };
      await ref.set(updates, { merge:true });
      if(role === 'prestataire' && extra.verifStatut === 'en_attente'){
        await db.collection("verifications").add({
          uid: cred.user.uid, nom: data.nom || nom, email, role,
          cni: extra.cni||'',
          photoBase64: extra.photoBase64||'',
          selfieBase64: extra.selfieBase64||'',
          verifStatut: 'en_attente',
          creeLe: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
      return { user: cred.user, addedRole:true };
    }
  },
  fbLogin: async (email, password) => {
    const cred = await auth.signInWithEmailAndPassword(email, password);
    try {
      const snap = await db.collection("users").doc(cred.user.uid).get();
      const authUser = auth.currentUser;
      if(snap.exists){
        const data = snap.data() || {};
        return {
          uid: cred.user.uid,
          email,
          emailVerified: !!(authUser && authUser.emailVerified),
          ...data,
          roles: getUserRoles(data),
          role: getDefaultRole(data)
        };
      } else {
        const defaultData = { email, role: 'visiteur', rolePrincipal:'visiteur', roles:['visiteur'], nom: email.split('@')[0], creeLe: null };
        await db.collection("users").doc(cred.user.uid).set(defaultData);
        return { uid: cred.user.uid, emailVerified: !!(authUser && authUser.emailVerified), ...defaultData };
      }
    } catch(e) {
      return { uid: cred.user.uid, email, emailVerified: !!(auth.currentUser && auth.currentUser.emailVerified), role: 'visiteur', rolePrincipal:'visiteur', roles:['visiteur'], nom: email.split('@')[0] };
    }
  },
  fbLogout: async () => {
    try{
      const cu = auth.currentUser;
      if(cu) await db.collection("users").doc(cu.uid).set({ online:false }, { merge:true });
    }catch(e){}
    await auth.signOut();
  },
  fbSaveMsg: async (convId, msg) => {
    await db.collection("conversations").doc(convId).collection("messages").add({ ...msg, creeLe: firebase.firestore.FieldValue.serverTimestamp() });
  },
  fbSaveCmd: async (cmd) => {
    await db.collection("commandes").doc(cmd.id).set({ ...cmd, creeLe: firebase.firestore.FieldValue.serverTimestamp() });
  },
};

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let STATE = {
  screen: 'splash',
  user: null,
  tab: 'home',
  selPrest: null,
  splashStep: 0,
  logoTaps: 0,
  logoTimer: null,
};

// ══════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════
let PRESTS = [];

const CATS = [
  {id:"all",label:"Tous",icon:"🌍"},
  {id:"batiment",label:"Bâtiment",icon:"🏗️"},
  {id:"beaute",label:"Beauté & Bien-être",icon:"✂️"},
  {id:"auto",label:"Auto & Moto",icon:"🚗"},
  {id:"agriculture",label:"Agriculture & Élevage",icon:"🌱"},
  {id:"sante",label:"Santé",icon:"❤️"},
  {id:"education",label:"Éducation & Cours",icon:"📚"},
  {id:"tech",label:"Tech & Informatique",icon:"💻"},
  {id:"commerce",label:"Commerce & Livraison",icon:"🛒"},
  {id:"evenement",label:"Événements",icon:"🎉"},
  {id:"cuisine",label:"Cuisine & Traiteur",icon:"🍽️"},
  {id:"menage",label:"Ménage & Nettoyage",icon:"🧹"},
  {id:"securite",label:"Sécurité & Gardiennage",icon:"🛡️"},
  {id:"couture",label:"Couture & Mode",icon:"🧵"},
  {id:"media",label:"Photo & Vidéo",icon:"📸"},
];

let CONVS = [];

let CMDS = [];

const STATUTS = {
  en_attente:{label:"En attente",color:"#F59E0B",icon:"⏳"},
  confirme:{label:"Confirmé",color:"#0ECFC9",icon:"✅"},
  en_cours:{label:"En cours",color:"#FF6B2B",icon:"🔄"},
  termine:{label:"Terminé",color:"#22C55E",icon:"🎉"},
  annule:{label:"Annulé",color:"#EF4444",icon:"❌"},
};

let PRESTS_UNSUB = null;
let CONVS_UNSUB = null;
let CMDS_UNSUB = null;
let CHAT_UNSUB = null;
let PRODUCTS_UNSUB = null;
let REVIEWS_UNSUB = null;
let PRODUCTS = [];
let REVIEWS = [];
let prestMgmtTab = 'gestion';

const DEFAULT_PREST_COLORS = ['#F5C842','#FF6B9D','#0ECFC9','#A78BFA','#22C55E','#FB923C','#4ADE80','#38BDF8','#60A5FA','#F472B6'];
const DEFAULT_PREST_EMOJIS = ['🔧','💇','⚡','📚','🐟','🔩','🌱','💻','🧵','🚚'];

function safeArray(v){ return Array.isArray(v) ? v : []; }
function safeText(v, fallback=''){ return (typeof v === 'string' && v.trim()) ? v.trim() : fallback; }
function hashCode(str){
  str = String(str || '');
  let h = 0;
  for(let i=0;i<str.length;i++){ h = ((h<<5)-h) + str.charCodeAt(i); h |= 0; }
  return Math.abs(h);
}
function inferPrestCategory(raw){
  const s = (raw || '').toLowerCase();
  if(/électric|electric/.test(s)) return 'batiment';
  if(/plomb|maçon|macon|menuis|peint|carrel|bât|bat/.test(s)) return 'batiment';
  if(/coiff|esth|beaut|maquill|ongle/.test(s)) return 'beaute';
  if(/auto|moto|mecan|mécan|pi[eè]ce|garage/.test(s)) return 'auto';
  if(/pisc|agri|p[eé]pini|semence|elev|élev|ferme/.test(s)) return 'agriculture';
  if(/cours|prof|enseign|formation/.test(s)) return 'education';
  if(/info|inform|ordinateur|r[eé]seau|develop/.test(s)) return 'tech';
  if(/livraison|boutique|vente|commerce|vendeur/.test(s)) return 'commerce';
  if(/traiteur|cuisine|restaurant/.test(s)) return 'cuisine';
  if(/ménage|menage|nettoy/.test(s)) return 'menage';
  if(/s[eé]curit|gardien/.test(s)) return 'securite';
  if(/couture|styliste|mode/.test(s)) return 'couture';
  if(/photo|vid[eé]o|media/.test(s)) return 'media';
  return 'all';
}
function normalizePrest(uid, data){
  data = data || {};
  const seed = hashCode(uid);
  const color = data.couleur || DEFAULT_PREST_COLORS[seed % DEFAULT_PREST_COLORS.length];
  const emoji = data.emoji || DEFAULT_PREST_EMOJIS[seed % DEFAULT_PREST_EMOJIS.length];
  const tags = safeArray(data.tags).filter(Boolean).slice(0,3);
  const metier = safeText(data.metier, 'Prestataire');
  const ville = safeText(data.ville, 'Cameroun');
  return {
    id: uid,
    uid: uid,
    nom: safeText(data.nom, 'Prestataire KoneKt'),
    metier,
    cat: data.cat || inferPrestCategory(metier),
    ville,
    note: Number(data.note || 0) || 0,
    avis: Number(data.avis || 0) || 0,
    tarif: Number(data.tarif || 0) || 0,
    unite: safeText(data.unite, 'service'),
    tags: tags.length ? tags : [metier, ville].filter(Boolean).slice(0,2),
    online: data.online === true,
    dispo: (typeof data.online === 'boolean') ? data.online : (data.dispo !== false),
    verifie: data.verifStatut === 'valide' || data.verifie === true,
    emoji,
    couleur: color,
    bio: safeText(data.bio, 'Prestataire inscrit sur KoneKt.'),
    tel: safeText(data.tel, ''),
    email: safeText(data.email, ''),
    photoURL: safeText(data.photoURL || data.photoBase64 || '', ''),
    lat: (typeof data.lat === 'number') ? data.lat : null,
    lng: (typeof data.lng === 'number') ? data.lng : null,
    roles: getUserRoles(data),
    role: getUserRoles(data).includes('prestataire') ? 'prestataire' : (data.role || 'prestataire')
  };
}
function normalizeConv(docId, data){
  data = data || {};
  const msgs = safeArray(data.msgs);
  return {
    id: docId,
    prestId: data.prestId || '',
    nonLus: Number(data.nonLus || 0) || 0,
    statut: safeText(data.statut, 'Nouveau'),
    msgs: msgs
  };
}
function normalizeCmd(docId, data){
  data = data || {};
  return {
    id: docId,
    prestId: data.prestId || data.prestataireUid || '',
    statut: data.statut || 'en_attente',
    service: safeText(data.service, 'Service'),
    date: safeText(data.date, new Date().toISOString().slice(0,10)),
    heure: safeText(data.heure, '08:00'),
    duree: Number(data.duree || 1) || 1,
    adresse: safeText(data.adresse, ''),
    total: Number(data.total || 0) || 0,
    cree: safeText(data.cree, '')
  };
}

function normalizeProduct(docId, data){
  data = data || {};
  return {
    id: docId,
    ownerUid: data.ownerUid || '',
    title: safeText(data.title, 'Activité'),
    price: Number(data.price || 0) || 0,
    description: safeText(data.description, ''),
    comment: safeText(data.comment, ''),
    photoBase64: safeText(data.photoBase64, ''),
    createdAt: data.createdAt || null
  };
}

function normalizeReview(docId, data){
  data = data || {};
  return {
    id: docId,
    prestId: String(data.prestId || ''),
    authorUid: String(data.authorUid || ''),
    authorName: safeText(data.authorName, 'Utilisateur'),
    note: Math.max(1, Math.min(5, Number(data.note || 5) || 5)),
    comment: safeText(data.comment, ''),
    createdAt: data.createdAt || null
  };
}
function stopRealtime(){
  try{ if(PRESTS_UNSUB) PRESTS_UNSUB(); }catch(e){}
  try{ if(CONVS_UNSUB) CONVS_UNSUB(); }catch(e){}
  try{ if(CMDS_UNSUB) CMDS_UNSUB(); }catch(e){}
  try{ if(CHAT_UNSUB) CHAT_UNSUB(); }catch(e){}

function loadPrestatairesRealtime(){
  try{ if(PRESTS_UNSUB) PRESTS_UNSUB(); }catch(e){}
  PRESTS_UNSUB = db.collection('users').onSnapshot(function(snap){
    PRESTS = snap.docs
      .map(function(doc){ return { id: doc.id, ...(doc.data() || {}) }; })
      .filter(function(u){
        const roles = getUserRoles(u);
        return roles.includes('prestataire');
      })
      .map(function(u){ return normalizePrest(u.id, u); });
    if(STATE.screen==='app' && STATE.tab==='home' && !STATE.selPrest){ renderHome(); }
    if(STATE.screen==='app' && STATE.tab==='profile' && STATE.user && STATE.user.role==='admin'){ renderProfile(); }
  }, function(err){
    console.error('PRESTS snapshot error', err);
    PRESTS = [];
    if(STATE.screen==='app' && STATE.tab==='home' && !STATE.selPrest){ renderHome(); }
  });
}
function loadConvsRealtime(){
  if(!STATE.user || !STATE.user.uid) return;
  try{ if(CONVS_UNSUB) CONVS_UNSUB(); }catch(e){}
  CONVS_UNSUB = db.collection('conversations').where('participants','array-contains', STATE.user.uid).onSnapshot(function(snap){
    CONVS = snap.docs.map(function(doc){
      const d = doc.data() || {};
      const otherIds = safeArray(d.participants).filter(function(x){ return x !== STATE.user.uid; });
      const prestId = d.prestId || otherIds[0] || '';
      const lastText = safeText(d.lastText, '');
      const lastFromMe = d.lastSenderUid === STATE.user.uid;
      return {
        id: doc.id,
        prestId: prestId,
        clientUid: d.clientUid || '',
        participants: safeArray(d.participants),
        nonLus: Number(d.unreadBy && d.unreadBy[STATE.user.uid] || 0) || 0,
        statut: safeText(d.statut, 'Conversation'),
        msgs: lastText ? [{id:'last', from:lastFromMe?'me':'them', text:lastText, time:safeText(d.lastTime, ''), date:'Aujourd\'hui'}] : []
      };
    }).filter(function(cv){ return !!cv.prestId; });
    var unreadTotal = CONVS.reduce(function(a,c){ return a + (c.nonLus||0); }, 0);
    if(MSG_INIT_DONE && unreadTotal > LAST_UNREAD_TOTAL){
      var deltaConv = CONVS.find(function(c){ return (c.nonLus||0) > 0; });
      var pp = deltaConv ? prest(deltaConv.prestId) : null;
      pushAppNotification('Nouveau message', pp ? ('De ' + pp.nom) : 'Tu as reçu un nouveau message');
    }
    LAST_UNREAD_TOTAL = unreadTotal;
    MSG_INIT_DONE = true;
    if(STATE.screen==='app' && STATE.tab==='msgs' && !selConvId){ renderMsgList(); }
    if(STATE.screen==='app' && STATE.user && STATE.user.role!=='admin'){ setNav(true, STATE.tab); }
  }, function(err){
    console.error('CONVS snapshot error', err);
    CONVS = [];
  });
}
function loadCmdsRealtime(){
  if(!STATE.user || !STATE.user.uid) return;
  try{ if(CMDS_UNSUB) CMDS_UNSUB(); }catch(e){}
  const field = STATE.user.role === 'prestataire' ? 'prestataireUid' : 'clientUid';
  CMDS_UNSUB = db.collection('commandes').where(field,'==', STATE.user.uid).onSnapshot(function(snap){
    CMDS = snap.docs.map(function(doc){ return normalizeCmd(doc.id, doc.data()); });
    var activeTotal = CMDS.filter(function(c){ return ['en_attente','confirme','en_cours'].includes(c.statut); }).length;
    if(CMD_INIT_DONE && activeTotal > LAST_ACTIVE_CMD_TOTAL){
      pushAppNotification(STATE.user.role==='prestataire' ? 'Nouvelle commande' : 'Mise à jour de commande', STATE.user.role==='prestataire' ? 'Une commande a été reçue' : 'Une commande a été mise à jour');
    }
    LAST_ACTIVE_CMD_TOTAL = activeTotal;
    CMD_INIT_DONE = true;
    if(STATE.screen==='app' && STATE.tab==='cmds' && !selCmdId){ renderCmdList(); }
    if(STATE.screen==='app' && STATE.user && STATE.user.role!=='admin'){ setNav(true, STATE.tab); }
  }, function(err){
    console.error('CMDS snapshot error', err);
    CMDS = [];
  });
}
function loadProductsRealtime(){
  try{ if(PRODUCTS_UNSUB) PRODUCTS_UNSUB(); }catch(e){}
  PRODUCTS_UNSUB = db.collection('products').onSnapshot(function(snap){
    PRODUCTS = snap.docs.map(function(doc){ return normalizeProduct(doc.id, doc.data()); });
    if(STATE.screen==='app' && STATE.tab==='profile' && STATE.user && STATE.user.role==='prestataire'){ renderProfile(); }
    if(STATE.screen==='app' && STATE.tab==='home' && STATE.selPrest){ renderPrestDetail(); }
  }, function(err){
    console.error('PRODUCTS snapshot error', err);
    PRODUCTS = [];
  });
}

  loadPrestatairesRealtime();
  loadProductsRealtime();
  if(STATE.user && STATE.user.uid){
    loadConvsRealtime();
    loadCmdsRealtime();
  }
}

async function compressImageFile(file, opts = {}){
  const maxWidth = opts.maxWidth || 1280;
  const maxHeight = opts.maxHeight || 1280;
  const targetBytes = opts.targetBytes || 850000;
  const minQuality = opts.minQuality || 0.45;

  const readAsDataURL = (f) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(f);
  });

  const dataUrl = await readAsDataURL(file);
  const img = await new Promise((resolve, reject) => {
    const i = new Image();
    i.onload = () => resolve(i);
    i.onerror = reject;
    i.src = dataUrl;
  });

  let { width, height } = img;
  const ratio = Math.min(maxWidth / width, maxHeight / height, 1);
  width = Math.round(width * ratio);
  height = Math.round(height * ratio);

  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, width, height);

  let quality = 0.82;
  let out = canvas.toDataURL('image/jpeg', quality);

  while(out.length > targetBytes && quality > minQuality){
    quality -= 0.08;
    out = canvas.toDataURL('image/jpeg', quality);
  }

  // last resort: shrink dimensions further once if still too big
  if(out.length > targetBytes){
    const canvas2 = document.createElement('canvas');
    canvas2.width = Math.max(480, Math.round(width * 0.72));
    canvas2.height = Math.max(480, Math.round(height * 0.72));
    const ctx2 = canvas2.getContext('2d');
    ctx2.drawImage(canvas, 0, 0, canvas2.width, canvas2.height);
    quality = 0.72;
    out = canvas2.toDataURL('image/jpeg', quality);
    while(out.length > targetBytes && quality > minQuality){
      quality -= 0.08;
      out = canvas2.toDataURL('image/jpeg', quality);
    }
  }

  return out;
}

function trText(value){
  let out = value;
  const pairs = TEXT_PAIRS.slice().sort(function(a,b){ return Math.max(b[0].length,b[1].length) - Math.max(a[0].length,a[1].length); });
  pairs.forEach(function(pair){
    const fr = pair[0], en = pair[1];
    if(APP_LANG === 'en'){
      out = out.split(fr).join(en);
    } else {
      out = out.split(en).join(fr);
    }
  });
  return out;
}

function translateUI(root){
  root = root || document.body;

  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  const nodes = [];
  while(walker.nextNode()) nodes.push(walker.currentNode);
  nodes.forEach(function(node){
    const raw = node.nodeValue;
    if(!raw || !raw.trim()) return;
    const translated = trText(raw);
    if(translated !== raw) node.nodeValue = translated;
  });

  root.querySelectorAll('input[placeholder], textarea[placeholder]').forEach(function(el){
    const p = el.getAttribute('placeholder');
    if(p) el.setAttribute('placeholder', trText(p));
  });

  root.querySelectorAll('[title]').forEach(function(el){
    const p = el.getAttribute('title');
    if(p) el.setAttribute('title', trText(p));
  });
}

function distanceKm(lat1,lng1,lat2,lng2){
  if([lat1,lng1,lat2,lng2].some(v => typeof v !== 'number')) return null;
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLng = (lng2-lng1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function requestUserLocation(){
  if(!navigator.geolocation){ showToast('Géolocalisation non prise en charge','var(--err)'); return; }
  GEO_BUSY = true;
  navigator.geolocation.getCurrentPosition(function(pos){
    USER_GEO = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    GEO_BUSY = false;
    showToast('Position détectée');
    if(STATE.screen==='app' && STATE.tab==='home' && !STATE.selPrest) renderHome();
  }, function(err){
    GEO_BUSY = false;
    showToast('Impossible d\'obtenir la position','var(--err)');
  }, { enableHighAccuracy:true, timeout:10000, maximumAge:60000 });
}
function setPrestGeoFromDevice(){
  if(!STATE.user || STATE.user.role!=='prestataire'){ return; }
  if(!navigator.geolocation){ showToast('Géolocalisation non prise en charge','var(--err)'); return; }
  navigator.geolocation.getCurrentPosition(function(pos){
    const payload = { lat: pos.coords.latitude, lng: pos.coords.longitude, online:true };
    db.collection('users').doc(STATE.user.uid).set(payload, { merge:true }).then(function(){
      Object.assign(STATE.user, payload);
      showToast('Position mise à jour');
      renderProfile();
    }).catch(function(e){
      const msg = (e && e.message || '');
      if(msg.includes('photoBase64') || msg.includes('longer than')){
        showToast('Image trop lourde. Essaie une photo plus légère.','var(--err)');
      } else {
        showToast('Erreur: '+e.message,'var(--err)');
      }
    });
  }, function(){
    showToast('Impossible d\'obtenir la position','var(--err)');
  }, { enableHighAccuracy:true, timeout:10000, maximumAge:60000 });
}

        <div id="selfie-preview" style="font-size:36px;margin-bottom:6px">🤳</div>
        <div style="font-size:11px;color:var(--muted)">Caméra frontale — visage visible</div>

async function previewPhoto(input, previewId){
  if(input.files && input.files[0]){
    try{
      const compressed = await compressImageFile(input.files[0], { maxWidth: 1200, maxHeight: 1200, targetBytes: 700000 });
      const prev = document.getElementById(previewId||'photo-preview');
      if(prev) prev.innerHTML = `<img src="${compressed}" style="width:80px;height:80px;object-fit:cover;border-radius:10px;margin-bottom:4px"/>`;
      if(previewId==='photo-preview') window._photoBase64 = compressed;
      if(previewId==='selfie-preview') window._selfieBase64 = compressed;
    }catch(err){
      showToast('Image impossible à traiter','var(--err)');
      console.error(err);
    }
  }
}

async function submitRegister(role){
  const nom=$('r-nom').value.trim();
  const email=$('r-email').value.trim().toLowerCase();
  const pass=$('r-pass').value.trim();
  if(!nom||!email||!pass){ showToast('Remplis tous les champs obligatoires.','var(--err)'); return; }
  if(pass.length<6){ showToast('Le mot de passe doit faire au moins 6 caractères.','var(--err)'); return; }
  const btn=$('register-btn');
  if(btn){ btn.textContent='Création en cours...'; btn.disabled=true; }
  try {
    const metier=($('r-metier')||{}).value||'';
    const ville=($('r-ville')||{}).value||'';
    const tel=($('r-tel')||{}).value||'';

    let verifStatut='non_soumis';
    let cni='';
    if(role==='prestataire'){
      const cniEl=$('r-cni');
      const photoEl=$('r-photo');
      if(cniEl && cniEl.value.trim()){
        cni=cniEl.value.trim();
        verifStatut='en_attente';
      } else if(photoEl && photoEl.files && photoEl.files[0]){
        verifStatut='en_attente';
      }
      if(window._photoBase64) sessionStorage.setItem('verif_photo_'+email, window._photoBase64);
      if(window._selfieBase64) sessionStorage.setItem('verif_selfie_'+email, window._selfieBase64);
    }

    const result = await window.FB.fbRegister(email, pass, role, nom, {
      metier, ville, tel, cni, verifStatut,
      photoBase64: window._photoBase64||'',
      selfieBase64: window._selfieBase64||''
    });
    window._photoBase64 = null;
    window._selfieBase64 = null;

    await sendVerificationEmailIfNeeded();
    const user = await window.FB.fbLogin(email, pass);
    STATE.user = user;
    try{ await db.collection('users').doc(user.uid).set({ online:true }, { merge:true }); }catch(e){}
    STATE.screen='app';
    STATE.tab = role==='prestataire' ? 'profile' : 'home';
    startRealtime();
    if(user.roles && user.roles.length>1){
      showRoleChooser(user.roles);
    }
    if(!user.emailVerified){
      showToast('📧 Vérifie ton email pour confirmer ton inscription');
    } else if(result.addedRole){
      showToast('✅ Deuxième profil ajouté à cet email');
    } else if(verifStatut==='en_attente'){
      showToast('✅ Compte créé ! Vérification en cours 🛡️');
    } else {
      showToast(`✅ Bienvenue ${nom} !`);
    }
    render();
  } catch(e) {
    let msg = 'Erreur lors de la création du compte.';
    if(e.code==='auth/email-already-in-use') msg='Cet email est déjà utilisé.';
    if(e.code==='profile/already-exists') msg='Ce profil existe déjà pour cet email.';
    if(e.code==='auth/invalid-email') msg='Email invalide.';
    if(e.code==='auth/wrong-password' || e.code==='auth/invalid-credential') msg='Cet email existe déjà. Utilise le même mot de passe pour lui ajouter un second profil.';
    if(e.code==='auth/weak-password') msg='Mot de passe trop faible.';
    showToast(msg,'var(--err)');
    if(btn){ btn.textContent=role==='prestataire'?'Créer mon profil prestataire':'Créer mon compte'; btn.disabled=false; }
  }
}

let pinVal='', pinError=false;

function showAdminPin(){
  pinVal=''; pinError=false;
  document.body.insertAdjacentHTML('beforeend',`
    <div class="modal-overlay" id="pin-modal" style="align-items:center;padding:24px">
      <div style="background:var(--bg);border:1.5px solid var(--border);border-radius:24px;padding:32px 28px;width:100%;max-width:320px;text-align:center;animation:fadeUp .3s ease" id="pin-box">

        <h2 style="font-size:19px;font-weight:800;margin-bottom:6px">Accès Administrateur</h2>
        <p style="color:var(--muted);font-size:13px;margin-bottom:28px">Entrez le code PIN administrateur</p>
        <div id="pin-dots" style="display:flex;justify-content:center;gap:16px;margin-bottom:28px"></div>
        <div id="pin-error" style="color:var(--err);font-size:12px;font-weight:700;margin-bottom:12px;display:none">Code incorrect. Réessayez.</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-bottom:14px">
          ${["1","2","3","4","5","6","7","8","9","","0","⌫"].map((k,i)=>
            k===''?`<div></div>`:
            `<button onclick="pinKey('${k}')" style="height:58px;border-radius:13px;background:var(--card);border:1.5px solid var(--border);color:${k==='⌫'?'var(--err)':'var(--text)'};font-size:${k==='⌫'?'20':'22'}px;font-weight:700">${k}</button>`
          ).join('')}
        </div>
        <button class="btn-ghost" onclick="closePin()">Annuler</button>
      </div>
    </div>`);
  renderPinDots();
}

function renderPinDots(){
  const d=$('pin-dots');
  if(!d) return;
  d.innerHTML=[0,1,2,3].map(i=>`
    <div style="width:18px;height:18px;border-radius:50%;background:${i<pinVal.length?(pinError?'var(--err)':'var(--gold)'):'var(--border)'};border:2px solid ${i<pinVal.length?(pinError?'var(--err)':'var(--gold)'):'var(--border)'};transition:all .2s;transform:${i<pinVal.length?'scale(1.15)':'scale(1)'}"></div>
  `).join('');
}

function pinKey(k){
  if(k==='⌫'){ pinVal=pinVal.slice(0,-1); pinError=false; $('pin-error').style.display='none'; renderPinDots(); return; }
  if(pinVal.length>=4) return;
  pinVal+=k;
  renderPinDots();
  if(pinVal.length===4){
    if(pinVal===ADMIN_PIN){
      setTimeout(()=>{ closePin(); goRegister('admin'); },300);
    } else {
      pinError=true; renderPinDots();
      $('pin-error').style.display='block';
      const box=$('pin-box'); box.style.animation='shakeX .6s ease';
      setTimeout(()=>{ pinVal=''; pinError=false; renderPinDots(); $('pin-error').style.display='none'; box.style.animation=''; },700);
    }
  }
}

function closePin(){ const m=$('pin-modal'); if(m) m.remove(); }

async function doLogin(){
  const email=$('l-email').value.trim().toLowerCase();
  const pass=$('l-pass').value.trim();
  if(!email||!pass){ showToast('Remplis tous les champs.','#EF4444'); return; }
  const btn=document.querySelector('#login-screen .btn-primary');
  if(btn){ btn.textContent='Connexion...'; btn.disabled=true; }
  try {
    const user = await window.FB.fbLogin(email, pass);
    STATE.user = user;
    try{ await db.collection('users').doc(user.uid).set({ online:true }, { merge:true }); }catch(e){}
    STATE.screen='app';
    STATE.tab = user.role==='admin' ? 'admin' : (user.role==='prestataire' ? 'profile' : 'home');
    startRealtime();
    render();
    if(user.roles && user.roles.length>1){
      showRoleChooser(user.roles);
    }
    if(!user.emailVerified){
      showToast('📧 Email non confirmé. Vérifie ta boîte mail.');
    }
  } catch(e) {
    let msg = 'Une erreur est survenue. Réessaie.';
    if(e.code==='auth/user-not-found'||e.code==='auth/invalid-credential') msg='Aucun compte avec cet email.';
    if(e.code==='auth/wrong-password') msg='Mot de passe incorrect.';
    if(e.code==='auth/invalid-email') msg='Email invalide.';
    if(e.code==='auth/too-many-requests') msg='Trop de tentatives. Réessaie dans quelques minutes.';
    if(e.code==='auth/network-request-failed') msg='Problème de connexion internet.';
    showToast(msg,'var(--err)');
    if(btn){ btn.textContent=t('login_btn'); btn.disabled=false; }
  }
}

function renderHome(){
  if(STATE.selPrest){ renderPrestDetail(); return; }
  const q = (searchVal || '').toLowerCase();
  let filtered = PRESTS.map(function(p){
    const hay = [p.nom,p.metier,p.ville].concat(Array.isArray(p.tags)?p.tags:[]).join(' ').toLowerCase();
    const match = (activeCat==='all'||p.cat===activeCat) && (!q || hay.includes(q));
    const dist = USER_GEO ? distanceKm(USER_GEO.lat, USER_GEO.lng, p.lat, p.lng) : null;
    return Object.assign({}, p, { _match: match, _dist: dist });
  }).filter(function(p){ return p._match; });

  if(USER_GEO){
    filtered.sort(function(a,b){
      const ad = a._dist == null ? 1e9 : a._dist;
      const bd = b._dist == null ? 1e9 : b._dist;

      onmouseleave="this.style.transform='';this.style.boxShadow='0 2px 12px rgba(4,13,26,.06)'">
      <div style="height:5px;background:${p.couleur};"></div>
      <div style="padding:15px 16px">
        <div style="display:flex;align-items:flex-start;gap:13px;margin-bottom:11px">
          <div class="avatar" style="width:52px;height:52px;background:${p.couleur}18;font-size:26px;flex-shrink:0;overflow:hidden">${p.photoURL?`<img src="${p.photoURL}" style="width:100%;height:100%;object-fit:cover"/>`:p.emoji}</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">

function canCurrentUserReview(prestId){
  if(!STATE.user || !STATE.user.uid) return false;
  const role = String(STATE.user.role || '').toLowerCase();
  if(role === 'prestataire' || role === 'admin') return false;
  return String(STATE.user.uid) !== String(prestId);
}

function getReviewsForPrest(prestId){
  return REVIEWS.filter(function(r){ return String(r.prestId) === String(prestId); });
}

function loadReviewsRealtime(prestId){
  if(REVIEWS_UNSUB) try{ REVIEWS_UNSUB(); }catch(e){}
  REVIEWS_UNSUB = db.collection('reviews')
    .where('prestId','==',String(prestId))
    .onSnapshot(function(snap){
      REVIEWS = snap.docs.map(function(d){ var obj=d.data(); obj.id=d.id; return obj; });
      // Recalculate average note and avis count, update prestataire card
      var total = REVIEWS.reduce(function(a,r){ return a + (Number(r.note)||0); }, 0);
      var avg = REVIEWS.length ? Math.round((total/REVIEWS.length)*10)/10 : 0;
      // Update PRESTS local copy
      var pidx = PRESTS.findIndex(function(p){ return String(p.id)===String(prestId); });
      if(pidx !== -1){
        PRESTS[pidx].note = avg;
        PRESTS[pidx].avis = REVIEWS.length;
      }
      // Also update Firestore prestataire doc with new average
      if(REVIEWS.length > 0){
        db.collection('users').doc(String(prestId)).update({
          note: avg,
          avis: REVIEWS.length
        }).catch(function(){});
      }
      // Re-render if we're on the avis tab
      if(STATE.selPrest && String(STATE.selPrest.id)===String(prestId) && prestTab==='avis'){
        renderPrestDetail();
      }
    }, function(e){ console.error('reviews error',e); });
}

(function(){
  if(window.__prestTabDelegationInstalled) return;
  window.__prestTabDelegationInstalled = true;

  function handlePrestTabDelegation(ev){
    const target = ev.target && ev.target.closest ? ev.target.closest('[data-prest-tab]') : null;
    if(!target) return;
    const tab = target.getAttribute('data-prest-tab');
    if(!tab) return;
    ev.preventDefault();
    ev.stopPropagation();
    if(tab === 'avis') openAvisTab();
    else setPrestTab(tab);
  }

  document.addEventListener('click', handlePrestTabDelegation, true);
  document.addEventListener('touchend', handlePrestTabDelegation, true);
})();

function recalcOrderTotal(){
  const rows = Array.from(document.querySelectorAll('.cart-qty-input'));
  let total = 0;
  rows.forEach(function(inp){
    const price = Number(inp.getAttribute('data-price') || 0);
    const qty = Math.max(1, Number(inp.value || 1));
    const line = price * qty;
    total += line;
    const out = document.getElementById('cart-line-total-' + inp.getAttribute('data-id'));
    if(out) out.textContent = line ? fmt(line) : t('on_quote');
  });
  const grand = document.getElementById('ord-total');
  if(grand) grand.value = total || Number(grand.value || 0);
}

function openConv(id){
  CONVS=CONVS.map(c=>String(c.id)===String(id)?{...c,nonLus:0}:c);
  selConvId=String(id);
  try{ if(CHAT_UNSUB) CHAT_UNSUB(); }catch(e){}
  try{
    db.collection('conversations').doc(String(id)).set({ unreadBy: { [STATE.user.uid]: 0 } }, { merge:true });
  }catch(e){}
  CHAT_UNSUB = db.collection('conversations').doc(String(id)).collection('messages').orderBy('creeLe','asc').onSnapshot(function(snap){
    const cv = CONVS.find(function(c){ return String(c.id)===String(id); });
    if(!cv) return;
    cv.msgs = snap.docs.map(function(doc){
      const d = doc.data() || {};
      return {id:doc.id, from:d.from === (STATE.user||{}).uid ? 'me' : 'them', text:safeText(d.text,''), time:safeText(d.time,''), date:"Aujourd'hui"};
    });
    if(selConvId===String(id) && STATE.tab==='msgs'){ renderChat(); }
  }, function(err){ console.error('CHAT snapshot error', err); renderChat(); });
  renderChat();
}

function chatEnter(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); } }

function sendMsg(){
  var inp = $('chat-inp'); if(!inp) return;
  var txt = inp.value.trim(); if(!txt) return;
  inp.value = '';
  var u = STATE.user || {};
  var convId = String(selConvId);
  var nowTxt = now();

  var conv = CONVS.find(function(c){ return c.id==convId; }) || {};
  var otherUid = conv.prestId === (u.uid||'') ? (conv.clientUid||'') : (conv.prestId||'');
  db.collection('conversations').doc(convId).set({
    lastText: txt,
    lastTime: nowTxt,
    lastSenderUid: u.uid || '',
    prestId: conv.prestId || '',
    clientUid: conv.clientUid || (u.role==='visiteur' ? (u.uid||'') : ''),
    participants: safeArray(conv.participants).length ? conv.participants : [u.uid, otherUid].filter(Boolean),
    unreadBy: otherUid ? { [otherUid]: 1 } : {}
  }, {merge:true}).then(function(){
    return db.collection('conversations').doc(convId).collection('messages').add({
      text: txt,
      from: u.uid,
      senderNom: u.nom || 'Moi',
      time: nowTxt,
      creeLe: firebase.firestore.FieldValue.serverTimestamp()
    });
  }).then(function(){
    var cv = CONVS.find(function(c){ return c.id == selConvId; });
    if(cv){
      cv.msgs = cv.msgs || [];
      cv.msgs.push({id:Date.now(),from:'me',text:txt,time:nowTxt,date:"Aujourd'hui"});
    }
    renderChat();
  }).catch(function(e){
    var cv = CONVS.find(function(c){ return c.id == selConvId; });
    if(cv){
      cv.msgs = cv.msgs || [];
      cv.msgs.push({id:Date.now(),from:'me',text:txt,time:nowTxt,date:"Aujourd'hui"});
    }
    renderChat();
  });
}

function saveReview(prestId, reviewId){
  if(!canCurrentUserReview(prestId)){ return; }
  const payload = {
    prestId: String(prestId),
    authorUid: String(STATE.user.uid),
    authorName: STATE.user.nom || 'Utilisateur',
    note: Number(window._reviewStars || 5),
    comment: (document.getElementById('review-comment')||{}).value || '',
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  const existing = getReviewsForPrest(prestId).find(function(r){ return String(r.authorUid)===String(STATE.user.uid); });
  const ref = reviewId ? db.collection('reviews').doc(reviewId) : (existing ? db.collection('reviews').doc(existing.id) : db.collection('reviews').doc());
  ref.set(payload, { merge:true }).then(function(){
    const modal = document.getElementById('review-modal'); if(modal) modal.remove();
    showToast('✅ Avis enregistré !');

  }).catch(function(e){
    showToast('Impossible d\'enregistrer l\'avis: ' + e.message, 'var(--err)');

}

    {l:"Commande reçue",done:true},
    {l:"Confirmée",done:['confirme','en_cours','termine'].includes(cmd.statut)},
    {l:"Intervention en cours",done:['en_cours','termine'].includes(cmd.statut)},
    {l:"Terminée",done:cmd.statut==='termine'},
  ] : [
    {l:"Commande envoyée",done:true},

  ];

      <button onclick="selCmdId=null;renderCmdList()" style="background:var(--card);border:none;border-radius:10px;color:var(--text);width:36px;height:36px;font-size:18px;display:flex;align-items:center;justify-content:center;margin-bottom:14px">←</button>
      <div style="display:flex;gap:13px;align-items:center;margin-bottom:13px">
        <div class="avatar" style="width:54px;height:54px;background:${(p.couleur||'#5BB8F5')}22;border:2px solid ${(p.couleur||'#5BB8F5')}55;font-size:26px">${isPrest?'👤':(p.emoji||'🔧')}</div>
        <div><div style="font-weight:800;font-size:17px">${counterpartName}</div><div style="color:${(p.couleur||'#5BB8F5')};font-weight:600;font-size:13px">${counterpartMeta}</div></div>
      </div>
      <span style="background:${st.color}22;color:${st.color};font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px">${st.icon} ${st.label}</span>
    </div>
    <div style="padding:16px">
      <div style="background:var(--sand);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px">
        <div class="stitle">Service</div>
        <div style="font-weight:800;font-size:16px;margin-bottom:6px">${cmd.service}</div>
        <div style="color:var(--muted);font-size:13px;line-height:1.6">📍 ${cmd.adresse||'Adresse non renseignée'}<br>📅 ${new Date(cmd.date).toLocaleDateString('fr-FR')} à ${cmd.heure}<br>⏱️ ${cmd.duree} h<br>💰 ${fmt(cmd.total)}</div>
        ${actionBtn}
      </div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px">
        <div class="stitle">Suivi</div>
        ${tl.map(function(step,i){ return `<div style="display:flex;gap:12px;position:relative;padding-bottom:${i<tl.length-1?'14':'0'}px">
          ${i<tl.length-1?'<div class="step-line"></div>':''}

          <div class="step-content"><div style="font-weight:700;color:${step.done?'var(--text)':'var(--muted)'}">${step.l}</div></div>
        </div>`; }).join('')}
      </div>
    </div>
  </div>`);
}

function prestAcceptCmd(cmdId){
  db.collection('commandes').doc(cmdId).set({ statut:'confirme' }, { merge:true })
    .then(function(){ showToast('Commande acceptée'); })
    .catch(function(e){
      const msg = (e && e.message || '');
      if(msg.includes('photoBase64') || msg.includes('longer than')){
        showToast('Image trop lourde. Essaie une photo plus légère.','var(--err)');
      } else {
        showToast('Erreur: '+e.message,'var(--err)');
      }
    });
}
function prestStartCmd(cmdId){
  db.collection('commandes').doc(cmdId).set({ statut:'en_cours' }, { merge:true })
    .then(function(){ showToast('Intervention démarrée'); })
    .catch(function(e){
      const msg = (e && e.message || '');
      if(msg.includes('photoBase64') || msg.includes('longer than')){
        showToast('Image trop lourde. Essaie une photo plus légère.','var(--err)');
      } else {
        showToast('Erreur: '+e.message,'var(--err)');
      }
    });
}
function prestFinishCmd(cmdId){
  db.collection('commandes').doc(cmdId).set({ statut:'termine' }, { merge:true })
    .then(function(){ showToast('Commande terminée'); })
    .catch(function(e){
      const msg = (e && e.message || '');
      if(msg.includes('photoBase64') || msg.includes('longer than')){
        showToast('Image trop lourde. Essaie une photo plus légère.','var(--err)');
      } else {
        showToast('Erreur: '+e.message,'var(--err)');
      }
    });
}

function editProfile(){
  const u = STATE.user || {};
  var old = document.getElementById('edit-profile-modal');
  if(old) old.remove();
  var modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'edit-profile-modal';
  modal.style.cssText = 'align-items:flex-start;padding:0;overflow-y:auto';
  var currentPhoto = u.photoURL || '';
  modal.innerHTML = '<div style="background:var(--bg);width:100%;min-height:100%;padding:24px 20px 40px">'
    + '<div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">'
    + '<button id="edit-back" style="background:var(--card);border:none;border-radius:12px;color:var(--text);font-size:18px;width:40px;height:40px;cursor:pointer">←</button>'
    + '<h2 style="font-size:18px;font-weight:800;color:var(--text)">' + t('edit_profile') + '</h2></div>'
    + '<div class="input-wrap"><label>Photo de profil</label><div style="border:2px dashed var(--border2);border-radius:14px;padding:14px;text-align:center;background:var(--card)"><input id="ep-photo" type="file" accept="image/*" style="display:none"/><div id="ep-photo-preview">' + (currentPhoto ? '<img src="' + currentPhoto + '" style="width:110px;height:110px;object-fit:cover;border-radius:20px;border:1px solid var(--border)"/>' : '<div style="width:110px;height:110px;margin:0 auto;border-radius:20px;background:var(--sand);display:flex;align-items:center;justify-content:center;font-size:42px">' + (u.role==='prestataire'?'🔧':'👤') + '</div>') + '</div><button id="ep-photo-btn" type="button" class="btn btn-outline" style="margin-top:10px">Choisir une photo</button></div></div>'
    + '<div class="input-wrap"><label>' + t('full_name') + '</label><div class="input-field"><input id="ep-nom" type="text" value="' + (u.nom||'') + '"/></div></div>'
    + (u.role==='prestataire' ? '<div class="input-wrap"><label>' + t('profession') + '</label><div class="input-field"><input id="ep-metier" type="text" value="' + (u.metier||'') + '"/></div></div>'
      + '<div class="input-wrap"><label>' + t('city') + '</label><div class="input-field"><input id="ep-ville" type="text" value="' + (u.ville||'') + '"/></div></div>'
      + '<div class="input-wrap"><label>' + t('phone') + '</label><div class="input-field"><input id="ep-tel" type="tel" value="' + (u.tel||'') + '"/></div></div>'
      + '<div class="input-wrap"><label>Bio</label><div class="input-field"><textarea id="ep-bio" rows="3" style="width:100%;background:transparent;border:none;color:var(--text);outline:none">' + (u.bio||'') + '</textarea></div></div>'
      : '')
    + '<button id="ep-save" class="btn btn-primary" style="margin-top:16px">' + t('save') + '</button>'
    + '</div>';
  document.body.appendChild(modal);
  document.getElementById('edit-back').addEventListener('click', function(){ modal.remove(); });
  document.getElementById('ep-photo-btn').addEventListener('click', function(){ document.getElementById('ep-photo').click(); });
  document.getElementById('ep-photo').addEventListener('change', function(ev){
    var file = (ev.target.files||[])[0];
    if(!file) return;
    if(!file.type || file.type.indexOf('image/')!==0){ showToast('Choisis une image','var(--err)'); return; }
    var reader = new FileReader();
    reader.onload = function(e){
      currentPhoto = e.target.result;
      var prev = document.getElementById('ep-photo-preview');
      if(prev) prev.innerHTML = '<img src="' + currentPhoto + '" style="width:110px;height:110px;object-fit:cover;border-radius:20px;border:1px solid var(--border)"/>';
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('ep-save').addEventListener('click', function(){
    var nom = document.getElementById('ep-nom').value.trim();
    if(!nom){ showToast('Le nom est obligatoire','var(--err)'); return; }
    var updates = { nom: nom, photoURL: currentPhoto || '' };
    if(u.role==='prestataire'){
      updates.metier = (document.getElementById('ep-metier')||{}).value||u.metier||'';
      updates.ville = (document.getElementById('ep-ville')||{}).value||u.ville||'';
      updates.tel = (document.getElementById('ep-tel')||{}).value||u.tel||'';
      updates.bio = (document.getElementById('ep-bio')||{}).value||u.bio||'';
    }
    db.collection('users').doc(u.uid).set(updates, { merge:true }).then(function(){
      Object.assign(STATE.user, updates);
      PRESTS = PRESTS.map(function(p){ return String(p.id)===String(u.uid) ? Object.assign({}, p, updates) : p; });
      showToast(APP_LANG==='en' ? 'Profile updated' : 'Profil mis à jour');
      modal.remove();
      renderProfile();
    }).catch(function(e){
      showToast('Erreur: ' + e.message,'var(--err)');
    });
  });
}

function showSecurityModal(){

    + '<h2 style="font-size:18px;font-weight:800;color:var(--text)">Sécurité</h2></div>'
    + '<div class="input-wrap"><label>Nouveau mot de passe</label><div class="input-field" style="display:flex;align-items:center"><input id="sec-pass" type="password" placeholder="Minimum 6 caractères" style="flex:1"/><button type="button" id="sec-eye" style="background:none;border:none;cursor:pointer;font-size:18px;padding:0 8px;color:var(--muted)">👁️</button></div></div>'
    + '<button id="sec-save" class="btn btn-primary" style="margin-top:16px">Changer le mot de passe</button>'
    + '</div>';
  document.body.appendChild(modal);
  document.getElementById('sec-back').addEventListener('click', function(){ modal.remove(); });
  document.getElementById('sec-eye').addEventListener('click', function(){
    var inp = document.getElementById('sec-pass');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    this.innerHTML = inp.type === 'password' ? '👁️' : '🙈';
  });
  document.getElementById('sec-save').addEventListener('click', function(){
    var pass = document.getElementById('sec-pass').value.trim();
    if(pass.length < 6){ showToast('Minimum 6 caractères','var(--err)'); return; }
    auth.currentUser.updatePassword(pass)
      .then(function(){ showToast('✅ Mot de passe modifié !'); modal.remove(); })
      .catch(function(e){ showToast('Erreur: ' + e.message,'var(--err)'); });
  });
}

function openProductModal(productId){
  var item = PRODUCTS.find(function(it){ return String(it.id)===String(productId); }) || null;
  var old = document.getElementById('product-modal'); if(old) old.remove();
  var modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'product-modal';
  modal.style.cssText = 'align-items:flex-start;padding:0;overflow-y:auto';
  modal.innerHTML = '<div style="background:var(--bg);width:100%;min-height:100%;padding:24px 20px 40px">'
    + '<div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">'
    + '<button id="prod-back" style="background:var(--card);border:none;border-radius:12px;color:var(--text);font-size:18px;width:40px;height:40px;cursor:pointer">←</button>'
    + '<h2 style="font-size:18px;font-weight:800;color:var(--text)">'+(item?'Modifier':'Nouvelle')+' activité</h2></div>'
    + '<div class="input-wrap"><label>Titre</label><div class="input-field"><input id="prod-title" type="text" value="'+(item?item.title:'')+'" placeholder="Ex: Pose de carrelage"/></div></div>'
    + '<div class="input-wrap"><label>Prix</label><div class="input-field"><input id="prod-price" type="number" value="'+(item?item.price:'')+'" placeholder="Ex: 15000"/></div></div>'
    + '<div class="input-wrap"><label>Commentaire court</label><div class="input-field"><input id="prod-comment" type="text" value="'+(item?item.comment:'')+'" placeholder="Ex: Devis gratuit"/></div></div>'
    + '<div class="input-wrap"><label>Description</label><div class="input-field"><textarea id="prod-desc" rows="4" style="width:100%;background:transparent;border:none;color:var(--text);outline:none">'+(item?item.description:'')+'</textarea></div></div>'
    + '<div class="input-wrap"><label>Photo</label><div style="border:2px dashed var(--border2);border-radius:14px;padding:14px;text-align:center;background:var(--card)"><input id="prod-photo" type="file" accept="image/*" style="display:none"/><div id="prod-photo-preview"></div><button id="prod-photo-btn" type="button" class="btn btn-outline" style="margin-top:10px">Choisir une photo</button></div></div>'
    + '<button id="prod-save" class="btn btn-primary" style="margin-top:16px">Enregistrer</button>'
    + '</div>';
  document.body.appendChild(modal);
  var currentPhoto = item && item.photoBase64 ? item.photoBase64 : '';
  var preview = document.getElementById('prod-photo-preview');
  preview.innerHTML = currentPhoto ? '<img src="'+currentPhoto+'" style="width:100%;max-height:180px;object-fit:cover;border-radius:12px;border:1px solid var(--border)"/>' : '<div style="color:var(--muted);font-size:12px">Aucune photo sélectionnée</div>';
  document.getElementById('prod-back').onclick = function(){ modal.remove(); };
  document.getElementById('prod-photo-btn').onclick = function(){ document.getElementById('prod-photo').click(); };
  document.getElementById('prod-photo').onchange = async function(e){
    var file = (e.target.files||[])[0];
    if(!file) return;
    if(!file.type.startsWith('image/')){ showToast('Choisis une image','var(--err)'); return; }
    try{
      currentPhoto = await compressImageFile(file, { maxWidth: 1280, maxHeight: 1280, targetBytes: 700000 });
      preview.innerHTML = '<img src="'+currentPhoto+'" style="width:100%;max-height:180px;object-fit:cover;border-radius:12px;border:1px solid var(--border)"/>';
    }catch(err){
      showToast('Image impossible à traiter','var(--err)');
      console.error(err);
    }
  };
  document.getElementById('prod-save').onclick = function(){
    var title = document.getElementById('prod-title').value.trim();
    var price = Number(document.getElementById('prod-price').value || 0);
    var comment = document.getElementById('prod-comment').value.trim();
    var description = document.getElementById('prod-desc').value.trim();
    if(!title){ showToast('Le titre est obligatoire','var(--err)'); return; }
    var payload = { ownerUid: STATE.user.uid, title:title, price:price, comment:comment, description:description, photoBase64: currentPhoto || '', createdAt: firebase.firestore.FieldValue.serverTimestamp() };
    var ref = item ? db.collection('products').doc(item.id) : db.collection('products').doc();
    ref.set(payload, { merge:true }).then(function(){ showToast(item?'Activité modifiée':'Activité publiée'); modal.remove(); })
      .catch(function(e){
      const msg = (e && e.message || '');
      if(msg.includes('photoBase64') || msg.includes('longer than')){
        showToast('Image trop lourde. Essaie une photo plus légère.','var(--err)');
      } else {
        showToast('Erreur: '+e.message,'var(--err)');
      }
    });
  };
}
function deleteProduct(productId){
  if(!confirm('Supprimer cette activité ?')) return;
  db.collection('products').doc(productId).delete()
    .then(function(){ showToast('Activité supprimée'); })
    .catch(function(e){
      const msg = (e && e.message || '');
      if(msg.includes('photoBase64') || msg.includes('longer than')){
        showToast('Image trop lourde. Essaie une photo plus légère.','var(--err)');
      } else {
        showToast('Erreur: '+e.message,'var(--err)');
      }
    });
}

async function logout(){
  try { await window.FB.fbLogout(); } catch(e){}
  STATE.user=null; STATE.screen='welcome'; render();
}

function validerPrest(id, action){
  var updates = action === 'ok'
    ? {verifie: true, verifStatut: 'approuve'}
    : {verifie: false, verifStatut: 'refuse'};
  db.collection('users').doc(id).update(updates)
    .then(function(){
      showToast(action==='ok' ? '✅ Prestataire validé !' : '❌ Demande refusée.', action==='ok' ? 'var(--ok)' : 'var(--err)');
      renderAdminVal();
    })
    .catch(function(e){ showToast('Erreur: '+e.message,'var(--err)'); });
}

  var el = document.getElementById('verif-list');
  db.collection('users').where('role','==','prestataire').get()
    .then(function(snap){
      var prests = snap.docs.map(function(d){ var obj = d.data(); obj.id = d.id; return obj; });
      window._pendingVerifs = prests;
      if(!el) return;
      if(prests.length === 0){
        el.innerHTML = '<div style="text-align:center;padding:40px"><div style="font-size:48px">📭</div><div style="margin-top:12px;color:var(--muted)">Aucun prestataire inscrit</div></div>';
        return;
      }
      var html = '<p style="color:var(--muted);font-size:13px;margin-bottom:16px">' + prests.length + ' prestataire(s)</p>';
      prests.forEach(function(v){
        var badge = v.verifie ? t('verified') : t('pending');
        var badgeBg = v.verifie ? 'rgba(26,138,74,.15)' : 'rgba(212,160,23,.15)';
        var badgeCol = v.verifie ? 'var(--ok)' : 'var(--gold)';
        html += '<div id="card-' + v.id + '" style="background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;cursor:pointer">';
        html += '<div style="display:flex;align-items:center;gap:12px">';
        html += '<div style="width:46px;height:46px;border-radius:12px;background:rgba(91,184,245,.12);display:flex;align-items:center;justify-content:center;font-size:22px">🧑‍🔧</div>';
        html += '<div style="flex:1"><div style="font-weight:800;font-size:15px;color:var(--text)">' + (v.nom||'Sans nom') + '</div>';
        html += '<div style="font-size:12px;color:var(--muted);margin-top:2px">' + (v.metier||'Métier non renseigné') + '</div></div>';
        html += '<div style="font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:' + badgeBg + ';color:' + badgeCol + '">' + badge + '</div>';
        html += '</div><div style="margin-top:8px;font-size:11px;color:var(--accent);font-weight:600">👁️ Voir le dossier →</div></div>';
      });
      el.innerHTML = html;
      prests.forEach(function(v){
        var card = document.getElementById('card-' + v.id);
        if(card) card.addEventListener('click', function(){ showVerifDetail(v.id); });
      });
    })
    .catch(function(e){
      if(el) el.innerHTML = '<div style="background:rgba(204,34,34,.1);border-radius:12px;padding:16px"><div style="color:var(--err);font-weight:700">Erreur: ' + e.message + '</div></div>';
    });
}

function showVerifDetail(id){
  var vList = window._pendingVerifs || [];
  var v = null;
  for(var i = 0; i < vList.length; i++){ if(vList[i].id === id){ v = vList[i]; break; } }
  if(!v){ showToast('Introuvable','var(--err)'); return; }

  var old = document.getElementById('verif-modal');
  if(old) old.remove();

  var modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'verif-modal';
  modal.style.cssText = 'align-items:flex-start;padding:0;overflow-y:auto';

  var photoHtml = v.photoBase64
    ? '<img src="' + v.photoBase64 + '" style="width:100%;height:100%;object-fit:cover"/>'
    : '<div style="text-align:center;padding:20px"><div style="font-size:36px">📄</div><div style="font-size:10px;color:var(--muted);margin-top:6px">Non soumise</div></div>';

  var selfieHtml = v.selfieBase64
    ? '<img src="' + v.selfieBase64 + '" style="width:100%;height:100%;object-fit:cover"/>'
    : '<div style="text-align:center;padding:20px"><div style="font-size:36px">🤳</div><div style="font-size:10px;color:var(--muted);margin-top:6px">Non soumis</div></div>';

  var inner = '<div style="background:var(--bg);width:100%;min-height:100%;padding:24px 20px 40px">';
  inner += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">';
  inner += '<button id="modal-back" style="background:var(--card);border:none;border-radius:12px;color:var(--text);font-size:18px;width:40px;height:40px;cursor:pointer">←</button>';
  inner += '<h2 style="font-size:18px;font-weight:800;color:var(--text)">Dossier complet</h2></div>';
  inner += '<div style="background:var(--card);border-radius:16px;padding:16px;margin-bottom:16px">';
  inner += '<div style="font-weight:800;font-size:16px;color:var(--text)">' + (v.nom||'Sans nom') + '</div>';
  inner += '<div style="font-size:13px;color:var(--accent);margin-top:4px">' + (v.metier||'Prestataire') + '</div>';
  inner += '<div style="font-size:12px;color:var(--muted);margin-top:4px">' + (v.email||'') + '</div>';
  if(v.cni) inner += '<div style="margin-top:10px;background:var(--bg);border-radius:10px;padding:10px"><div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:4px">CNI / PASSEPORT</div><div style="font-size:15px;font-weight:800;letter-spacing:2px;color:var(--text)">' + v.cni + '</div></div>';
  inner += '</div>';
  inner += '<div style="font-weight:800;font-size:14px;color:var(--text);margin-bottom:12px">📸 Comparaison identité</div>';
  inner += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">';
  inner += '<div><div style="font-size:10px;color:var(--muted);font-weight:700;text-align:center;margin-bottom:8px">PIÈCE</div><div style="background:var(--card);border-radius:14px;overflow:hidden;aspect-ratio:1;display:flex;align-items:center;justify-content:center">' + photoHtml + '</div></div>';
  inner += '<div><div style="font-size:10px;color:var(--muted);font-weight:700;text-align:center;margin-bottom:8px">SELFIE</div><div style="background:var(--card);border-radius:14px;overflow:hidden;aspect-ratio:1;display:flex;align-items:center;justify-content:center">' + selfieHtml + '</div></div>';
  inner += '</div>';
  inner += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';
  inner += '<button id="btn-refuse" style="padding:16px;background:rgba(204,34,34,.1);border:1.5px solid var(--err);border-radius:16px;color:var(--err);font-weight:800;font-size:14px;cursor:pointer">✕ Refuser</button>';
  inner += '<button id="btn-approuve" style="padding:16px;background:linear-gradient(135deg,#1A8A4A,#2952CC);border:none;border-radius:16px;color:#fff;font-weight:800;font-size:14px;cursor:pointer">✓ Approuver</button>';
  inner += '</div></div>';

  modal.innerHTML = inner;
  document.body.appendChild(modal);

  document.getElementById('modal-back').addEventListener('click', function(){ modal.remove(); });
  document.getElementById('btn-refuse').addEventListener('click', function(){ traiterVerif(v.id,'refuse'); modal.remove(); });
  document.getElementById('btn-approuve').addEventListener('click', function(){ traiterVerif(v.id,'approuve'); modal.remove(); });
}


async function traiterVerif(id, action){
  try {
    await db.collection("verifications").doc(id).update({verifStatut: action});
    if(action==='approuve'){
      // Get uid from verification doc and update user
      const vSnap = await db.collection("verifications").doc(id).get();
      if(vSnap.exists){
        await db.collection("users").doc(vSnap.data().uid).update({verifie: true, verifStatut: 'approuve'});
      }
    }
  } catch(e){ console.error(e); }
  showToast(action==='approuve'?'✅ Badge ✓ accordé au prestataire !':'❌ Vérification refusée.', action==='approuve'?'var(--ok)':'var(--err)');
  // In real app: update Firestore doc
  setTimeout(()=>renderAdminVerifs(), 100);
}

function renderAdminSigs(){
  s(`<div style="padding:20px 16px 90px;background:var(--bg)">
    <div style="margin-bottom:20px">
      <div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Administration</div>
      <h2 style="font-size:22px;font-weight:800;color:var(--text)">Signalements 🚨</h2>
    </div>
    <div id="sigs-list"><div style="text-align:center;padding:40px;color:var(--muted)"><div style="font-size:40px">⏳</div><div style="margin-top:12px">'+t('loading')+'</div></div></div>
  </div>`);

  db.collection('signalements').orderBy('creeLe','desc').get()
    .then(function(snap){
      var el = document.getElementById('sigs-list');
      if(!el) return;
      if(snap.empty){
        el.innerHTML = '<div style="text-align:center;padding:50px 0"><div style="font-size:56px">✅</div><div style="font-weight:700;margin-top:12px;color:var(--text)">'+t('no_reports')+'</div></div>';
        return;
      }
      var html = '';
      snap.docs.forEach(function(d){
        var sg = d.data(); sg.id = d.id;
        var gc = {haute:'var(--err)', moyenne:'var(--warn)', basse:'var(--teal)'};
        var c = gc[sg.gravite] || gc.moyenne;
        html += '<div style="background:var(--card);border:1.5px solid '+c+'44;border-radius:14px;overflow:hidden;margin-bottom:11px">'
          +'<div style="background:'+c+'18;padding:11px 14px;display:flex;gap:8px;align-items:center">'
          +'<span style="font-size:17px">🚨</span>'
          +'<span style="font-weight:700;color:'+c+';font-size:13px">'+(sg.type||'Signalement')+'</span>'
          +'<span style="background:'+c+'22;color:'+c+';font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:capitalize">'+(sg.gravite||'')+'</span>'
          +'</div>'
          +'<div style="padding:12px 14px">'
          +'<div style="font-size:12px;color:var(--muted);margin-bottom:3px">De : <b style="color:var(--text)">'+(sg.de||sg.nomAuteur||'Anonyme')+'</b> · Contre : <b style="color:var(--text)">'+(sg.contre||sg.nomCible||'?')+'</b></div>'
          +'<div style="font-size:13px;background:var(--bg);border-radius:9px;padding:9px 11px;margin:9px 0;line-height:1.5">'+(sg.desc||sg.description||'')+'</div>'
          +'<div style="display:flex;gap:8px">'
          +'<button id="sig-clot-'+sg.id+'" style="flex:1;padding:9px;border-radius:9px;background:rgba(26,138,74,.1);border:1px solid rgba(26,138,74,.3);color:var(--ok);font-weight:700;font-size:11px;cursor:pointer">✓ Clôturer</button>'
          +'<button id="sig-supp-'+sg.id+'" style="flex:1;padding:9px;border-radius:9px;background:rgba(204,34,34,.1);border:1px solid rgba(204,34,34,.3);color:var(--err);font-weight:700;font-size:11px;cursor:pointer">✕ Supprimer</button>'
          +'</div></div></div>';
      });
      el.innerHTML = html;
      snap.docs.forEach(function(d){
        var sid = d.id;
        var bc = document.getElementById('sig-clot-'+sid);
        var bs = document.getElementById('sig-supp-'+sid);
        if(bc) bc.addEventListener('click', function(){ cloturerSignalement(sid); });
        if(bs) bs.addEventListener('click', function(){ supprimerSignalement(sid); });
      });
    })
    .catch(function(e){
      var el = document.getElementById('sigs-list');
      if(el) el.innerHTML = '<div style="color:var(--err);padding:16px">Erreur: '+e.message+'</div>';
    });
}

function cloturerSignalement(id){
  db.collection('signalements').doc(id).update({statut:'cloture'})
    .then(function(){ showToast('✅ Signalement clôturé'); renderAdminSigs(); })
    .catch(function(e){ showToast('Erreur: '+e.message,'var(--err)'); });
}
function supprimerSignalement(id){
  db.collection('signalements').doc(id).delete()
    .then(function(){ showToast('🗑️ Signalement supprimé'); renderAdminSigs(); })
    .catch(function(e){ showToast('Erreur: '+e.message,'var(--err)'); });
}

// ══════════════════════════════════════════════
try {
  var _visited = false;
  try { _visited = !!localStorage.getItem('konekt_visited'); } catch(e){}
  if(_visited){ STATE.screen = 'welcome'; }
  render();
  try { setTimeout(function(){ localStorage.setItem('konekt_visited','1'); }, 3000); } catch(e){}
} catch(err){
  document.body.style.background = '#071428';
  document.body.innerHTML = '<div style="color:#fff;padding:40px;text-align:center"><div style="font-size:48px">⚠️</div><div style="margin-top:16px;font-size:16px">Erreur de démarrage</div><div style="margin-top:8px;font-size:12px;opacity:.7">' + err.message + '</div></div>';
}

document.addEventListener('click', function(e){
  if(e.target && e.target.id === 'go-login-btn'){
    STATE.screen='login'; render();
  }
});

function togglePass(id, btn){
  const inp = document.getElementById(id);
  if(!inp) return;
  if(inp.type === 'password'){
    inp.type = 'text';
    if(btn) btn.innerHTML = '🙈';
  } else {
    inp.type = 'password';
    if(btn) btn.innerHTML = '👁️';
  }
}
