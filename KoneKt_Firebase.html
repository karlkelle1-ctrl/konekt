:root{

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;overflow:hidden;}
/* scrollable content area */
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.screen::-webkit-scrollbar{display:none;}
/* animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shakeX{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.fadeUp{animation:fadeUp .45s ease both;}
input,textarea,button{font-family:'Sora',sans-serif;outline:none;}
button{cursor:pointer;transition:all .15s;}
button:active{transform:scale(.94);}
textarea{resize:none;}
/* BOTTOM NAV */
#bottom-nav{
  display:none;flex-shrink:0;
  background:var(--surface);border-top:1px solid var(--border);
  padding:10px 0 max(16px,env(safe-area-inset-bottom));
}
#bottom-nav.show{display:flex;}
.nav-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;position:relative;}
.nav-btn .nav-icon{font-size:22px;}
.nav-btn .nav-lbl{font-size:9px;font-weight:700;color:var(--muted);}
.nav-btn.active .nav-lbl{color:var(--accent);}
.nav-btn .nav-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);display:none;}
.nav-btn.active .nav-dot{display:block;}
.nav-badge{position:absolute;top:0;right:22%;width:16px;height:16px;border-radius:50%;color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--surface);}
/* TOAST */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 22px;border-radius:14px;font-weight:700;font-size:14px;z-index:9999;box-shadow:0 8px 24px #0008;white-space:nowrap;display:none;animation:slideIn .3s ease;}
/* MODAL OVERLAY */
.modal-overlay{position:fixed;inset:0;background:#000a;z-index:500;display:flex;align-items:flex-end;justify-content:center;}
.modal-sheet{background:var(--surface);border-radius:22px 22px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:slideUp .32s ease;padding-bottom:env(safe-area-inset-bottom);}
.modal-sheet::-webkit-scrollbar{display:none;}
/* CARDS */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:18px;}
/* BUTTONS */
.btn{border:none;border-radius:14px;font-weight:700;font-size:15px;padding:14px 22px;transition:all .18s;width:100%;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accl));color:#fff;box-shadow:0 4px 18px #FF6B2B44;}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border);}
.btn-danger{background:#EF444422;color:var(--err);border:1.5px solid #EF444444;}
.btn-success{background:#22C55E22;color:var(--ok);border:1.5px solid #22C55E44;}
.btn-ghost{background:transparent;border:none;color:var(--accent);font-weight:700;font-size:14px;padding:8px 0;width:auto;}
/* INPUTS */
.input-wrap{margin-bottom:14px;}
.input-wrap label{font-size:12px;color:var(--muted);font-weight:700;display:block;margin-bottom:6px;}
.input-field{display:flex;align-items:center;background:var(--card);border:1.5px solid var(--border);border-radius:13px;padding:0 14px;transition:border-color .2s;}
.input-field:focus-within{border-color:var(--accent);}
.input-field input,.input-field textarea{flex:1;background:transparent;border:none;color:var(--text);font-size:14px;padding:13px 0;outline:none;font-family:'Sora',sans-serif;}
.input-field textarea{padding:13px 0;min-height:80px;}
/* TAGS */
.tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
/* AVATAR */
.avatar{border-radius:28%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
/* STARS */
.stars{color:var(--gold);}
/* BADGE */
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
/* SECTION TITLE */
.stitle{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
/* STEP ROW */
.step-row{display:flex;gap:16px;padding-bottom:22px;position:relative;}
.step-row:last-child{padding-bottom:0;}
.step-dot{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accl));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0;box-shadow:0 4px 12px #FF6B2B44;}
.step-line{width:2px;background:var(--border);position:absolute;left:17px;top:40px;bottom:0;}
.step-content{flex:1;padding-top:6px;}
/* TIMELINE */
.tl-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.tl-line{width:2px;height:18px;margin-top:3px;}
</style>

async function fbRegister(email, password, role, nom) {
  const cred = await createUserWithEmailAndPassword(auth, email, password);
  await setDoc(doc(db, "users", cred.user.uid), { email, role, nom, creeLe: serverTimestamp() });
  return cred.user;
}

async function fbLogin(email, password) {
  const cred = await signInWithEmailAndPassword(auth, email, password);
  const snap = await getDoc(doc(db, "users", cred.user.uid));
  return { uid: cred.user.uid, email, ...snap.data() };
}

async function fbLogout() { await signOut(auth); }

async function fbSaveMsg(convId, msg) {
  await addDoc(collection(db, "conversations", convId, "messages"), {
    ...msg, creeLe: serverTimestamp()
  });
}

async function fbGetMsgs(convId, callback) {
  const q = query(collection(db, "conversations", convId, "messages"), orderBy("creeLe"));
  return onSnapshot(q, snap => {
    const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    callback(msgs);
  });
}

async function fbSaveCmd(cmd) {
  await setDoc(doc(db, "commandes", cmd.id), { ...cmd, creeLe: serverTimestamp() });
}

async function submitRegister(role){
  const nom=$('r-nom').value.trim();
  const email=$('r-email').value.trim();
  const pass=$('r-pass').value.trim();
  if(!nom||!email||!pass){ showToast('Remplis tous les champs obligatoires.','#EF4444'); return; }
  if(pass.length<6){ showToast('Le mot de passe doit faire au moins 6 caractères.','#EF4444'); return; }
  const btn=$('register-btn');
  if(btn){ btn.textContent='Création...'; btn.disabled=true; }
  try {
    const metier=($('r-metier')||{}).value||'';
    const ville=($('r-ville')||{}).value||'';
    const user = await window.FB.fbRegister(email, pass, role, nom);
    STATE.user = { uid:user.uid, email, role, nom, metier, ville };
    STATE.screen='app';
    STATE.tab='home';
    showToast(`✅ Bienvenue ${nom} !`);
    render();
  } catch(e) {
    let msg = 'Erreur lors de la création du compte.';
    if(e.code==='auth/email-already-in-use') msg='Cet email est déjà utilisé.';
    if(e.code==='auth/invalid-email') msg='Email invalide.';
    if(e.code==='auth/weak-password') msg='Mot de passe trop faible.';
    showToast(msg,'#EF4444');
    if(btn){ btn.textContent='Créer mon compte'; btn.disabled=false; }
  }
}

let pinVal='', pinError=false;

function showAdminPin(){
  pinVal=''; pinError=false;
  document.body.insertAdjacentHTML('beforeend',`
    <div class="modal-overlay" id="pin-modal" style="align-items:center;padding:24px">
      <div style="background:var(--surface);border:1.5px solid var(--border);border-radius:24px;padding:32px 28px;width:100%;max-width:320px;text-align:center;animation:fadeUp .3s ease" id="pin-box">
        <div style="font-size:40px;margin-bottom:12px">🛡️</div>
        <h2 style="font-size:19px;font-weight:800;margin-bottom:6px">Accès Administrateur</h2>
        <p style="color:var(--muted);font-size:13px;margin-bottom:28px">Entrez le code PIN administrateur</p>
        <div id="pin-dots" style="display:flex;justify-content:center;gap:16px;margin-bottom:28px"></div>
        <div id="pin-error" style="color:var(--err);font-size:12px;font-weight:700;margin-bottom:12px;display:none">Code incorrect. Réessayez.</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-bottom:14px">
          ${["1","2","3","4","5","6","7","8","9","","0","⌫"].map((k,i)=>
            k===''?`<div></div>`:
            `<button onclick="pinKey('${k}')" style="height:58px;border-radius:13px;background:var(--card);border:1.5px solid var(--border);color:${k==='⌫'?'var(--err)':'var(--text)'};font-size:${k==='⌫'?'20':'22'}px;font-weight:700">${k}</button>`
          ).join('')}
        </div>
        <button class="btn-ghost" onclick="closePin()">Annuler</button>
      </div>
    </div>`);
  renderPinDots();
}

function renderPinDots(){
  const d=$('pin-dots');
  if(!d) return;
  d.innerHTML=[0,1,2,3].map(i=>`
    <div style="width:18px;height:18px;border-radius:50%;background:${i<pinVal.length?(pinError?'var(--err)':'var(--gold)'):'var(--border)'};border:2px solid ${i<pinVal.length?(pinError?'var(--err)':'var(--gold)'):'var(--border)'};transition:all .2s;transform:${i<pinVal.length?'scale(1.15)':'scale(1)'}"></div>
  `).join('');
}

function pinKey(k){
  if(k==='⌫'){ pinVal=pinVal.slice(0,-1); pinError=false; $('pin-error').style.display='none'; renderPinDots(); return; }
  if(pinVal.length>=4) return;
  pinVal+=k;
  renderPinDots();
  if(pinVal.length===4){
    if(pinVal===ADMIN_PIN){
      setTimeout(()=>{ closePin(); goRegister('admin'); },300);
    } else {
      pinError=true; renderPinDots();
      $('pin-error').style.display='block';
      const box=$('pin-box'); box.style.animation='shakeX .6s ease';
      setTimeout(()=>{ pinVal=''; pinError=false; renderPinDots(); $('pin-error').style.display='none'; box.style.animation=''; },700);
    }
  }
}

function closePin(){ const m=$('pin-modal'); if(m) m.remove(); }

async function doLogin(){

          ${[{l:'Note',v:`${p.note} ★`},{l:'Avis',v:p.avis},{l:'Tarif',v:p.tarif?`${p.tarif.toLocaleString()}F`:'Devis'}].map((s,i)=>`<div style="text-align:center;padding:13px 6px;${i<2?'border-right:1px solid var(--border)':''}"><div style="font-weight:800;font-size:14px">${s.v}</div><div style="font-size:10px;color:var(--muted);margin-top:2px">${s.l}</div></div>`).join('')}
        </div>
      </div>
      <div style="display:flex;padding:14px 16px 0;gap:7px">${tabBtns}</div>
      <div style="padding:18px 16px">${tabContent}</div>

}

function setPrestTab(t){ prestTab=t; renderPrestDetail(); }
function goTabMsg(prestId){

}
function goTabCmd(prestId){

function renderMsgList(){
  const items=CONVS.map((cv,i)=>{
    const p=prest(cv.prestId); if(!p) return '';
    const last=cv.msgs[cv.msgs.length-1];
    return `<div onclick="openConv(${cv.id})" style="display:flex;gap:13px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;animation:fadeUp .4s ease ${i*.07}s both">
      <div style="position:relative">
        <div class="avatar" style="width:48px;height:48px;background:${p.couleur}22;border:2px solid ${p.couleur}55;font-size:22px">${p.emoji}</div>
        ${p.dispo?`<div style="position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:var(--ok);border:2px solid var(--surface)"></div>`:''}
      </div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between"><span style="font-weight:700;font-size:14px">${p.nom}</span><span style="font-size:11px;color:var(--muted)">${last?last.time:''}</span></div>
        <div style="font-size:12px;color:${p.couleur};font-weight:600;margin-bottom:3px">${p.metier}</div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:190px">${last?(last.from==='me'?'Vous: ':'')+last.text:''}</span>
          ${cv.nonLus>0?`<div style="background:var(--accent);color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0">${cv.nonLus}</div>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
  const totalUnread=CONVS.reduce((a,c)=>a+c.nonLus,0);
  s(`<div style="padding-bottom:80px">
    <div style="padding:18px 16px 14px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;backdrop-filter:blur(12px)">
      <h2 style="font-size:20px;font-weight:800">Messages ${totalUnread>0?`<span style="color:var(--accent)">(${totalUnread})</span>`:''}</h2>
    </div>
    ${CONVS.length===0?`<div style="text-align:center;padding:60px 0"><div style="font-size:56px;margin-bottom:12px">💬</div><div style="font-weight:700">Aucune conversation</div></div>`:items}
  </div>`);
}

function openConv(id){
  CONVS=CONVS.map(c=>c.id===id?{...c,nonLus:0}:c);
  selConvId=id; renderChat();
}

let typingTimer=null;
function renderChat(){
  const cv=CONVS.find(c=>c.id===selConvId); if(!cv) return;
  const p=prest(cv.prestId); if(!p) return;
  const bubbles=cv.msgs.map(m=>{
    const isMe=m.from==='me';
    return `<div style="display:flex;justify-content:${isMe?'flex-end':'flex-start'};align-items:flex-end;gap:7px;margin-bottom:6px">
      ${!isMe?`<div class="avatar" style="width:26px;height:26px;background:${p.couleur}22;border:1px solid ${p.couleur}55;font-size:12px">${p.emoji}</div>`:''}
      <div>
        <div style="background:${isMe?`linear-gradient(135deg,var(--accent),var(--accl))`:'#1A2E45'};color:var(--text);padding:10px 14px;border-radius:${isMe?'17px 17px 4px 17px':'17px 17px 17px 4px'};font-size:13px;line-height:1.5;max-width:240px;${isMe?'box-shadow:0 3px 12px #FF6B2B33':''}">${m.text}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:3px;text-align:${isMe?'right':'left'}">${m.time}${isMe?' ✓✓':''}</div>
      </div>
    </div>`;
  }).join('');
  s(`<div style="display:flex;flex-direction:column;height:100%">
    <div style="padding:12px 14px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px;flex-shrink:0;position:sticky;top:0;z-index:5">
      <button onclick="selConvId=null;renderMsgList()" style="background:var(--card);border:none;border-radius:10px;color:var(--text);width:36px;height:36px;font-size:17px;display:flex;align-items:center;justify-content:center">←</button>
      <div class="avatar" style="width:40px;height:40px;background:${p.couleur}22;border:1.5px solid ${p.couleur}55;font-size:20px">${p.emoji}</div>
      <div style="flex:1"><div style="font-weight:800;font-size:14px">${p.nom}</div><div id="chat-status" style="font-size:11px;color:${p.couleur};font-weight:600">${p.dispo?'En ligne':'Hors ligne'}</div></div>
      <button style="width:34px;height:34px;border-radius:10px;background:#25D36618;border:1px solid #25D36633;font-size:17px">💬</button>
      <button style="width:34px;height:34px;border-radius:10px;background:var(--card);border:1px solid var(--border);font-size:17px">📞</button>
    </div>
    <div id="chat-msgs" style="flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch">${bubbles}<div id="chat-bottom"></div></div>
    <div id="typing-ind" style="padding:6px 14px;display:none">
      <div style="display:flex;align-items:flex-end;gap:7px">
        <div class="avatar" style="width:26px;height:26px;background:${p.couleur}22;border:1px solid ${p.couleur}55;font-size:12px">${p.emoji}</div>
        <div style="background:#1A2E45;padding:10px 14px;border-radius:17px 17px 17px 4px;display:flex;gap:4px">
          <div style="width:5px;height:5px;border-radius:50%;background:var(--muted);animation:pulse 1.2s ease 0s infinite"></div>
          <div style="width:5px;height:5px;border-radius:50%;background:var(--muted);animation:pulse 1.2s ease .2s infinite"></div>
          <div style="width:5px;height:5px;border-radius:50%;background:var(--muted);animation:pulse 1.2s ease .4s infinite"></div>
        </div>
      </div>
    </div>
    <div style="padding:10px 14px 18px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:flex-end;gap:8px;flex-shrink:0">
      <div style="flex:1;background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:9px 13px">
        <textarea id="chat-inp" placeholder="Écrire un message..." rows="1" onkeydown="chatEnter(event)" style="width:100%;background:transparent;border:none;color:var(--text);font-size:13px;outline:none;max-height:80px;overflow-y:auto"></textarea>
      </div>
      <button id="send-btn" onclick="sendMsg()" style="width:42px;height:42px;border-radius:13px;background:var(--card);border:1.5px solid var(--border);font-size:18px;display:flex;align-items:center;justify-content:center">➤</button>
    </div>
  </div>`);
  setTimeout(()=>{ const b=$('chat-bottom'); if(b) b.scrollIntoView(); },100);
}

function chatEnter(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); } }

function sendMsg(){
  const inp=$('chat-inp'); if(!inp) return;
  const txt=inp.value.trim(); if(!txt) return;
  inp.value='';
  const cv=CONVS.find(c=>c.id===selConvId); if(!cv) return;
  cv.msgs.push({id:Date.now(),from:'me',text:txt,time:now(),date:'Aujourd\'hui'});
  renderChat();
  // Auto reply
  const ti=$('typing-ind'); if(ti) ti.style.display='block';
  const cs=$('chat-status'); if(cs){ cs.textContent='En train d\'écrire...'; cs.style.color='var(--teal)'; }
  const replies=["Bien reçu !","D'accord, noté.","Je reviens vers vous rapidement.","Parfait ! 👍","Laissez-moi vérifier ça."];
  clearTimeout(typingTimer);
  typingTimer=setTimeout(()=>{
    cv.msgs.push({id:Date.now()+1,from:'them',text:replies[Math.floor(Math.random()*replies.length)],time:now(),date:'Aujourd\'hui'});
    renderChat();
  },1800);
}

function renderCmdList(){

    const st=STATUTS[cmd.statut];
    return `<div onclick="openCmd('${cmd.id}')" style="background:var(--card);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;animation:fadeUp .4s ease ${i*.06}s both;margin-bottom:11px">
      <div style="background:${p.couleur}14;padding:12px 14px;display:flex;gap:11px;align-items:center">
        <div class="avatar" style="width:40px;height:40px;background:${p.couleur}22;border:1.5px solid ${p.couleur}55;font-size:20px">${p.emoji}</div>

        <span style="background:${st.color}22;color:${st.color};font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px">${st.icon} ${st.label}</span>
      </div>
      <div style="padding:11px 14px">
        <div style="font-weight:600;font-size:13px;margin-bottom:7px">${cmd.service}</div>
        <div style="display:flex;justify-content:space-between">
          <div style="display:flex;gap:12px"><span style="font-size:11px;color:var(--muted)">📅 ${new Date(cmd.date).toLocaleDateString('fr-FR')}</span><span style="font-size:11px;color:var(--muted)">🕐 ${cmd.heure}</span></div>
          <span style="font-weight:800;color:var(--accent);font-size:14px">${fmt(cmd.total)}</span>
        </div>
      </div>
    </div>`;
  }).join('');
  s(`<div style="padding-bottom:80px">
    <div style="padding:18px 16px 0;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;backdrop-filter:blur(12px)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <h2 style="font-size:20px;font-weight:800">Mes commandes</h2>
        <button onclick="openNewOrder()" style="background:linear-gradient(135deg,var(--accent),var(--accl));border:none;border-radius:11px;color:#fff;padding:9px 14px;font-weight:700;font-size:12px;box-shadow:0 4px 14px #FF6B2B44">+ Nouvelle</button>
      </div>
      <div style="display:flex">
        <button onclick="setCmdTab('active')" style="flex:1;padding:11px;border:none;border-bottom:2.5px solid ${cmdTab==='active'?'var(--accent)':'transparent'};background:transparent;color:${cmdTab==='active'?'var(--accent)':'var(--muted)'};font-weight:700;font-size:13px">En cours (${actives.length})</button>
        <button onclick="setCmdTab('done')" style="flex:1;padding:11px;border:none;border-bottom:2.5px solid ${cmdTab==='done'?'var(--accent)':'transparent'};background:transparent;color:${cmdTab==='done'?'var(--accent)':'var(--muted)'};font-weight:700;font-size:13px">Terminées (${terminees.length})</button>
      </div>
    </div>
    <div style="padding:14px 14px">
      ${list.length===0?`<div style="text-align:center;padding:50px 0"><div style="font-size:56px;margin-bottom:12px">📋</div><div style="font-weight:700;margin-bottom:6px">Aucune commande</div><button class="btn btn-primary" onclick="openNewOrder()" style="margin-top:14px">+ Nouvelle commande</button></div>`:cards}
    </div>
  </div>`);
}

function setCmdTab(t){ window._cmdTab=t; renderCmdList(); }
function openCmd(id){ selCmdId=id; renderCmdDetail(); }

function renderCmdDetail(){
  const cmd=CMDS.find(c=>c.id===selCmdId); if(!cmd) return;
  const p=prest(cmd.prestId); if(!p) return;
  const st=STATUTS[cmd.statut];
  const tl=[
    {l:"Commande envoyée",done:true},
    {l:"Acceptée par le prestataire",done:['confirme','en_cours','termine'].includes(cmd.statut)},
    {l:"Intervention en cours",done:['en_cours','termine'].includes(cmd.statut)},
    {l:"Prestation terminée",done:cmd.statut==='termine'},
  ];
  s(`<div style="padding-bottom:80px;animation:fadeUp .3s ease">
    <div style="background:linear-gradient(135deg,${p.couleur}22,var(--surface));padding:18px 16px 22px;border-bottom:1px solid var(--border)">
      <button onclick="selCmdId=null;renderCmdList()" style="background:var(--card);border:none;border-radius:10px;color:var(--text);width:36px;height:36px;font-size:18px;display:flex;align-items:center;justify-content:center;margin-bottom:14px">←</button>
      <div style="display:flex;gap:13px;align-items:center;margin-bottom:13px">
        <div class="avatar" style="width:54px;height:54px;background:${p.couleur}22;border:2px solid ${p.couleur}55;font-size:26px">${p.emoji}</div>
        <div><div style="font-weight:800;font-size:17px">${p.nom}</div><div style="color:${p.couleur};font-weight:600;font-size:13px">${p.metier}</div></div>
      </div>
      <span style="background:${st.color}22;color:${st.color};font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px">${st.icon} ${st.label}</span>

    <div style="padding:16px">
      <div style="background:var(--card);border-radius:14px;overflow:hidden;border:1px solid var(--border);margin-bottom:14px">
        ${[{i:"🛠️",l:"Service",v:cmd.service},{i:"📍",l:"Adresse",v:cmd.adresse},{i:"📅",l:"Date",v:`${new Date(cmd.date).toLocaleDateString('fr-FR')} à ${cmd.heure}`},{i:"💰",l:"Total",v:fmt(cmd.total)}].map((r,i,arr)=>`<div style="display:flex;gap:13px;padding:12px 14px;${i<arr.length-1?'border-bottom:1px solid var(--border)':''}"><span style="font-size:18px">${r.i}</span><div><div style="font-size:10px;color:var(--muted);font-weight:700">${r.l}</div><div style="font-size:13px;font-weight:${r.l==='Total'?800:400};color:${r.l==='Total'?'var(--accent)':'var(--text)'}">${r.v}</div></div></div>`).join('')}
      </div>
      <div style="background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--border);margin-bottom:14px">
        <div class="stitle">Suivi de la commande</div>
        ${tl.map((t,i)=>`
          <div style="display:flex;gap:12px;align-items:flex-start;${i<tl.length-1?'margin-bottom:16px':''}">
            <div style="display:flex;flex-direction:column;align-items:center">
              <div style="width:26px;height:26px;border-radius:50%;background:${t.done?'#22C55E33':'var(--border)'};border:2px solid ${t.done?'var(--ok)':'var(--border)'};display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0">${t.done?'✓':''}</div>
              ${i<tl.length-1?`<div style="width:2px;height:18px;background:${t.done?'#22C55E55':'var(--border)'};margin-top:3px"></div>`:''}
            </div>
            <div style="padding-top:3px;font-size:13px;font-weight:${t.done?700:400};color:${t.done?'var(--text)':'var(--muted)'}">${t.l}</div>
          </div>`).join('')}
      </div>
      <div style="display:flex;flex-direction:column;gap:9px">
        ${cmd.statut==='termine'?`<button class="btn btn-primary" onclick="openReview('${cmd.id}')">⭐ Évaluer la prestation</button>`:''}
        ${['confirme','en_attente'].includes(cmd.statut)?`<button class="btn btn-danger" onclick="cancelCmd('${cmd.id}')">Annuler la commande</button>`:''}
        <button class="btn btn-outline">💬 Contacter le prestataire</button>
      </div>
    </div>
  </div>`);
}

function cancelCmd(id){
  CMDS=CMDS.map(c=>c.id===id?{...c,statut:'annule'}:c);
  selCmdId=null; renderCmdList();
  showToast('Commande annulée.','#EF4444');
}

function openNewOrder(){
  if(!newOrderForm.prestId){ newOrderStep=0; newOrderForm={prestId:null,service:"",adresse:"",date:"",heure:"08:00",duree:1}; }
  renderNewOrderModal();
}

function renderNewOrderModal(){
  const existing=$('new-order-modal'); if(existing) existing.remove();
  const p=newOrderForm.prestId?PRESTS.find(x=>x.id===newOrderForm.prestId):null;
  const total=p&&p.tarif?p.tarif*newOrderForm.duree:0;
  const steps=['Prestataire','Détails','Planning'];
  const stepBar=steps.map((st,i)=>`<div style="flex:1"><div style="height:3px;border-radius:2px;background:${i<=newOrderStep?'var(--accent)':'var(--border)'}"></div><div style="font-size:9px;color:${i<=newOrderStep?'var(--accent)':'var(--muted)'};margin-top:3px;font-weight:700">${st}</div></div>`).join('');
  let body='';
  if(newOrderStep===0){
    body=PRESTS.map(pr=>`
      <div onclick="pickPrest(${pr.id})" style="background:${newOrderForm.prestId===pr.id?pr.couleur+'18':'var(--card)'};border:1.5px solid ${newOrderForm.prestId===pr.id?pr.couleur:'var(--border)'};border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:9px">
        <div class="avatar" style="width:44px;height:44px;background:${pr.couleur}22;border:1.5px solid ${pr.couleur}55;font-size:20px">${pr.emoji}</div>
        <div style="flex:1"><div style="font-weight:700;font-size:14px">${pr.nom}</div><div style="color:${pr.couleur};font-size:12px">${pr.metier} · ${pr.ville}</div></div>
        <div style="text-align:right"><div style="font-weight:800;color:var(--accent);font-size:13px">${pr.tarif?`${pr.tarif.toLocaleString()} F`:'Devis'}</div><div style="font-size:10px;color:var(--muted)">/${pr.unite}</div></div>
      </div>`).join('');
  } else if(newOrderStep===1){
    body=`
      <div class="input-wrap"><label>Décrivez votre besoin *</label><div class="input-field"><input id="of-service" value="${newOrderForm.service}" oninput="newOrderForm.service=this.value" placeholder="Ex: Réparation fuite cuisine"/></div></div>
      <div class="input-wrap"><label>Adresse d'intervention *</label><div class="input-field"><input id="of-adresse" value="${newOrderForm.adresse}" oninput="newOrderForm.adresse=this.value" placeholder="Quartier, ville"/></div></div>`;
  } else {
    const hours=Array.from({length:13},(_,i)=>`${String(i+7).padStart(2,'0')}:00`);
    body=`
      <div class="input-wrap"><label>Date *</label><div class="input-field"><input type="date" id="of-date" value="${newOrderForm.date}" oninput="newOrderForm.date=this.value" min="2026-03-02"/></div></div>
      <div style="margin-bottom:14px"><label style="font-size:12px;color:var(--muted);font-weight:700;display:block;margin-bottom:8px">Heure de début *</label>
      <div style="display:flex;flex-wrap:wrap;gap:7px">${hours.map(h=>`<button onclick="newOrderForm.heure='${h}';renderNewOrderModal()" style="padding:7px 12px;border-radius:9px;border:1.5px solid ${newOrderForm.heure===h?'var(--accent)':'var(--border)'};background:${newOrderForm.heure===h?'#FF6B2B22':'var(--card)'};color:${newOrderForm.heure===h?'var(--accent)':'var(--muted)'};font-size:12px;font-weight:700">${h}</button>`).join('')}</div></div>
      <div style="margin-bottom:14px"><label style="font-size:12px;color:var(--muted);font-weight:700;display:block;margin-bottom:8px">Durée estimée</label>
      <div style="display:flex;align-items:center;gap:14px">
        <button onclick="newOrderForm.duree=Math.max(1,newOrderForm.duree-1);renderNewOrderModal()" style="width:38px;height:38px;border-radius:11px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:20px">−</button>
        <div style="flex:1;text-align:center"><span style="font-size:26px;font-weight:800">${newOrderForm.duree}</span><span style="color:var(--muted);margin-left:5px">h</span></div>
        <button onclick="newOrderForm.duree++;renderNewOrderModal()" style="width:38px;height:38px;border-radius:11px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:20px">+</button>
      </div></div>
      ${p&&p.tarif>0?`<div style="background:#FF6B2B18;border:1.5px solid #FF6B2B44;border-radius:13px;padding:13px 14px"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="color:var(--muted);font-size:13px">${p.tarif.toLocaleString()} × ${newOrderForm.duree}h</span><span style="font-weight:700">${total.toLocaleString()} F</span></div><div style="display:flex;justify-content:space-between;border-top:1px solid #FF6B2B33;padding-top:9px;margin-top:5px"><span style="font-weight:800">Total estimé</span><span style="font-weight:800;font-size:17px;color:var(--accent)">${total.toLocaleString()} FCFA</span></div></div>`:''}`;
  }
  const canNext=[newOrderForm.prestId, newOrderForm.service&&newOrderForm.adresse, newOrderForm.date][newOrderStep];
  document.body.insertAdjacentHTML('beforeend',`
    <div class="modal-overlay" id="new-order-modal">
      <div class="modal-sheet" style="padding:0">
        <div style="padding:18px 18px 0;position:sticky;top:0;background:var(--surface);z-index:1">
          <div style="display:flex;justify-content:space-between;margin-bottom:14px">
            <h2 style="font-size:17px;font-weight:800">Nouvelle commande</h2>
            <button onclick="closeNewOrder()" style="background:var(--card);border:none;border-radius:9px;width:34px;height:34px;color:var(--muted);font-size:16px">✕</button>
          </div>
          <div style="display:flex;gap:5px;margin-bottom:18px">${stepBar}</div>
        </div>
        <div style="padding:0 18px 22px">
          ${body}
          <div style="display:flex;gap:9px;margin-top:18px">
            ${newOrderStep>0?`<button class="btn btn-outline" onclick="newOrderStep--;renderNewOrderModal()" style="flex:1">← Retour</button>`:''}
            ${newOrderStep<2
              ?`<button class="btn btn-primary" onclick="newOrderNext()" style="flex:1;${!canNext?'opacity:.45':''}" ${!canNext?'disabled':''}>Continuer →</button>`
              :`<button class="btn btn-primary" onclick="confirmOrder()" style="flex:1">✅ Confirmer</button>`}
          </div>
        </div>
      </div>
    </div>`);
}

function pickPrest(id){ newOrderForm.prestId=id; renderNewOrderModal(); }
function newOrderNext(){ newOrderStep++; renderNewOrderModal(); }
function closeNewOrder(){ const m=$('new-order-modal'); if(m) m.remove(); }
function confirmOrder(){
  const p=PRESTS.find(x=>x.id===newOrderForm.prestId);
  const total=p&&p.tarif?p.tarif*newOrderForm.duree:0;
  const newCmd={id:`CMD-${String(CMDS.length+1).padStart(3,'0')}`,prestId:newOrderForm.prestId,statut:'en_attente',service:newOrderForm.service,date:newOrderForm.date,heure:newOrderForm.heure,duree:newOrderForm.duree,adresse:newOrderForm.adresse,total,cree:new Date().toISOString().split('T')[0]};
  CMDS.unshift(newCmd);
  closeNewOrder();
  showToast(`✅ Commande envoyée à ${p?.nom} !`);
  renderCmdList();
}

// ══════════════════════════════════════════════
//  REVIEW
// ══════════════════════════════════════════════
function openReview(cmdId){
  reviewNote=0; reviewComment='';
  document.body.insertAdjacentHTML('beforeend',`
    <div class="modal-overlay" id="review-modal">
      <div class="modal-sheet" style="padding:24px">
        <div style="display:flex;justify-content:space-between;margin-bottom:18px">
          <h2 style="font-size:17px;font-weight:800">Évaluer la prestation</h2>
          <button onclick="document.getElementById('review-modal').remove()" style="background:var(--card);border:none;border-radius:9px;width:34px;height:34px;color:var(--muted);font-size:16px">✕</button>
        </div>
        <div style="text-align:center;margin-bottom:22px">
          <div id="rev-stars" style="display:flex;justify-content:center;gap:10px;margin-bottom:10px">
            ${[1,2,3,4,5].map(i=>`<span onclick="setRevNote(${i})" style="font-size:40px;cursor:pointer;color:${i<=reviewNote?'var(--gold)':'var(--border)'};transition:transform .15s;display:inline-block">★</span>`).join('')}
          </div>
          <div id="rev-lbl" style="color:var(--gold);font-weight:700;font-size:13px;min-height:18px">${reviewNote>0?['Mauvais','Passable','Bien','Très bien','Excellent'][reviewNote-1]:''}</div>
        </div>
        <div class="input-wrap"><label>Votre commentaire</label><div class="input-field"><textarea id="rev-comment" placeholder="Partagez votre expérience..." rows="3"></textarea></div></div>
        <button class="btn btn-primary" id="rev-submit" onclick="submitReview('${cmdId}')" style="${reviewNote===0?'opacity:.45':''}">Publier mon évaluation ⭐</button>
      </div>
    </div>`);
}

function setRevNote(n){
  reviewNote=n;
  const lbls=['Mauvais','Passable','Bien','Très bien','Excellent'];
  const starsEl=$('rev-stars');
  if(starsEl) starsEl.innerHTML=[1,2,3,4,5].map(i=>`<span onclick="setRevNote(${i})" style="font-size:40px;cursor:pointer;color:${i<=n?'var(--gold)':'var(--border)'};transition:transform .15s;display:inline-block;transform:${i<=n?'scale(1.2)':'scale(1)'}"">★</span>`).join('');
  const lbl=$('rev-lbl'); if(lbl) lbl.textContent=lbls[n-1];
  const sub=$('rev-submit'); if(sub) sub.style.opacity=n>0?'1':'0.45';
}

function submitReview(cmdId){
  if(reviewNote===0) return;
  const m=$('review-modal'); if(m) m.remove();
  selCmdId=null; showToast('⭐ Merci pour votre évaluation !');
  renderCmdList();
}

// ══════════════════════════════════════════════
//  PROFIL
// ══════════════════════════════════════════════
function renderProfile(){
  const u=STATE.user||{};
  s(`<div style="padding:28px 20px 80px;animation:fadeUp .4s ease">
    <div style="text-align:center;margin-bottom:28px">
      <div style="width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,var(--accent),var(--gold));display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 14px;box-shadow:0 8px 24px #FF6B2B44">${u.role==='prestataire'?'🔧':'👤'}</div>
      <h2 style="font-size:22px;font-weight:800">${u.nom||'Mon profil'}</h2>
      <p style="color:var(--muted);font-size:13px;margin-top:4px">${u.email||''}</p>
      <span style="background:${u.role==='prestataire'?'#FF6B2B22':'#3B82F622'};color:${u.role==='prestataire'?'var(--accent)':'#3B82F6'};font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;display:inline-block;margin-top:8px">${u.role==='prestataire'?'🔧 Prestataire':'👤 Visiteur'}</span>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:16px">
      ${[{i:'👤',l:'Modifier mon profil'},{i:'🔔',l:'Notifications'},{i:'🌐',l:'Langue : Français'},{i:'🔒',l:'Sécurité & confidentialité'},{i:'❓',l:'Aide & support'}].map((item,j,arr)=>`<div style="display:flex;align-items:center;gap:14px;padding:14px 16px;${j<arr.length-1?'border-bottom:1px solid var(--border)':''}"><span style="font-size:20px">${item.i}</span><span style="font-size:14px;font-weight:600;flex:1">${item.l}</span><span style="color:var(--muted)">›</span></div>`).join('')}
    </div>
    <button class="btn btn-outline" onclick="logout()">Se déconnecter</button>
  </div>`);
}

async function logout(){
  try { await window.FB.fbLogout(); } catch(e){}
  STATE.user=null; STATE.screen='welcome'; render();
}

// ══════════════════════════════════════════════
//  ADMIN
// ══════════════════════════════════════════════
function renderAdmin(){
  const t=adminTab;
  // Inject admin-specific nav into bottom nav
  $('bottom-nav').className='show';
  $('bottom-nav').innerHTML=`
    <button class="nav-btn ${t==='home'?'active':''}" onclick="setAdminTab('home')"><span class="nav-icon">🏠</span><span class="nav-lbl">Accueil</span><div class="nav-dot"></div></button>
    <button class="nav-btn ${t==='val'?'active':''}" onclick="setAdminTab('val')" style="position:relative">
      <span class="nav-icon">⏳</span><span class="nav-lbl">Validations</span><div class="nav-dot"></div>
      ${pendingPrests.length>0?`<div class="nav-badge" style="background:var(--warn)">${pendingPrests.length}</div>`:''}
    </button>
    <button class="nav-btn ${t==='sigs'?'active':''}" onclick="setAdminTab('sigs')" style="position:relative">
      <span class="nav-icon">🚨</span><span class="nav-lbl">Signalements</span><div class="nav-dot"></div>
      ${signals.length>0?`<div class="nav-badge" style="background:var(--err)">${signals.length}</div>`:''}
    </button>
    <button class="nav-btn" onclick="logout()"><span class="nav-icon">🚪</span><span class="nav-lbl">Quitter</span><div class="nav-dot"></div></button>`;
  if(t==='home') renderAdminHome();
  else if(t==='val') renderAdminVal();
  else if(t==='sigs') renderAdminSigs();
}

function setAdminTab(t){ adminTab=t; renderAdmin(); }

function renderAdminHome(){
  const stats=[
    {l:"Prestataires",v:248,d:"+12 ce mois",i:"🔧",c:"var(--accent)"},
    {l:"Visiteurs",v:1840,d:"+134 ce mois",i:"👤",c:"var(--teal)"},
    {l:"Commandes",v:527,d:"+43 ce mois",i:"📦",c:"var(--gold)"},
    {l:"CA estimé",v:"4,2M F",d:"+18%",i:"💰",c:"var(--purple)"},
  ];
  const statCards=stats.map((s,i)=>`<div style="background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:16px 14px;animation:fadeUp .4s ease ${i*.06}s both;position:relative;overflow:hidden"><div style="position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:${s.c}18;pointer-events:none"></div><div style="font-size:26px;margin-bottom:7px">${s.i}</div><div style="font-size:20px;font-weight:800">${s.v}</div><div style="font-size:12px;color:var(--muted);margin-top:2px">${s.l}</div><div style="font-size:10px;color:${s.c};font-weight:700;margin-top:5px">${s.d}</div></div>`).join('');
  s(`<div style="padding:18px 14px 80px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <div><div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase">Administration</div><div style="font-size:19px;font-weight:800">Kone<span style="color:var(--accent)">Kt</span></div></div>
      <div style="width:38px;height:38px;border-radius:11px;background:#FF6B2B22;border:1.5px solid #FF6B2B44;display:flex;align-items:center;justify-content:center;font-size:19px">🛡️</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:20px">${statCards}</div>
    <div onclick="setAdminTab('val')" style="background:#F59E0B18;border:1.5px solid #F59E0B44;border-radius:14px;padding:13px 14px;display:flex;align-items:center;gap:13px;cursor:pointer;margin-bottom:10px"><span style="font-size:26px">⏳</span><div style="flex:1"><div style="font-weight:700;color:var(--warn)">${pendingPrests.length} validations en attente</div><div style="font-size:11px;color:var(--muted)">Cliquez pour traiter</div></div><span style="color:var(--muted);font-size:17px">›</span></div>
    <div onclick="setAdminTab('sigs')" style="background:#EF444418;border:1.5px solid #EF444444;border-radius:14px;padding:13px 14px;display:flex;align-items:center;gap:13px;cursor:pointer"><span style="font-size:26px">🚨</span><div style="flex:1"><div style="font-weight:700;color:var(--err)">${signals.length} signalements ouverts</div><div style="font-size:11px;color:var(--muted)">Cliquez pour examiner</div></div><span style="color:var(--muted);font-size:17px">›</span></div>
  </div>`);
}

function renderAdminVal(){
  const cards=pendingPrests.map((p,i)=>`
    <div style="background:var(--card);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;animation:fadeUp .4s ease ${i*.07}s both;margin-bottom:10px">
      <div style="padding:13px 14px;display:flex;gap:11px;align-items:center">
        <div class="avatar" style="width:44px;height:44px;background:${p.couleur}22;border:1.5px solid ${p.couleur}55;font-size:22px">${p.emoji}</div>
        <div style="flex:1"><div style="font-weight:800;font-size:14px">${p.nom}</div><div style="color:${p.couleur};font-size:12px;font-weight:600">${p.metier} · ${p.ville}</div>
          <span style="background:${p.hasId?'#22C55E22':'#F59E0B22'};color:${p.hasId?'var(--ok)':'var(--warn)'};font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:5px;display:inline-block">${p.hasId?'🪪 ID soumise':'⚠️ ID manquante'}</span>
        </div>
      </div>
      <div style="display:flex;border-top:1px solid var(--border)">
        <button onclick="validerPrest('${p.id}','non')" style="flex:1;padding:11px;background:none;border:none;color:var(--err);font-weight:700;font-size:12px;border-right:1px solid var(--border)">✕ Refuser</button>
        <button onclick="validerPrest('${p.id}','ok')" style="flex:1;padding:11px;background:none;border:none;color:var(--ok);font-weight:700;font-size:12px">✓ Valider</button>
      </div>
    </div>`).join('');
  s(`<div style="padding:18px 14px 80px">
    <h2 style="font-size:18px;font-weight:800;margin-bottom:6px">Validations</h2>
    <p style="color:var(--muted);font-size:13px;margin-bottom:18px">${pendingPrests.length} demande${pendingPrests.length>1?'s':''} en attente</p>
    ${pendingPrests.length===0?`<div style="text-align:center;padding:50px 0"><div style="font-size:56px">🎉</div><div style="font-weight:700;margin-top:12px">Tout est traité !</div></div>`:cards}
  </div>`);
}

function validerPrest(id,action){
  pendingPrests=pendingPrests.filter(p=>p.id!==id);
  showToast(action==='ok'?'✅ Prestataire validé !':'❌ Demande refusée.', action==='ok'?'#22C55E':'#EF4444');
  renderAdmin();
}

function renderAdminSigs(){
  const gc={haute:{c:'var(--err)'},moyenne:{c:'var(--warn)'},basse:{c:'var(--teal)'}};
  const cards=signals.map((sg,i)=>{
    const g=gc[sg.gravite];
    return `<div style="background:var(--card);border:1.5px solid ${g.c}44;border-radius:14px;overflow:hidden;animation:fadeUp .4s ease ${i*.07}s both;margin-bottom:11px">
      <div style="background:${g.c}18;padding:11px 14px;display:flex;gap:8px;align-items:center">
        <span style="font-size:17px">🚨</span><span style="font-weight:700;color:${g.c};font-size:13px">${sg.type}</span>
        <span style="background:${g.c}22;color:${g.c};font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:capitalize">${sg.gravite}</span>
      </div>
      <div style="padding:12px 14px">
        <div style="font-size:12px;color:var(--muted);margin-bottom:3px">De : <b style="color:var(--text)">${sg.de}</b> · Contre : <b style="color:var(--text)">${sg.contre}</b></div>
        <div style="font-size:13px;background:var(--surface);border-radius:9px;padding:9px 11px;margin:9px 0;line-height:1.5">${sg.desc}</div>
        <div style="display:flex;gap:8px">
          <button style="flex:1;padding:9px;border-radius:9px;background:#EF444422;border:1px solid #EF444444;color:var(--err);font-weight:700;font-size:11px">Suspendre</button>
          <button onclick="closeSig('${sg.id}')" style="flex:1;padding:9px;border-radius:9px;background:var(--card);border:1px solid var(--border);color:var(--muted);font-weight:700;font-size:11px">Clôturer</button>
        </div>
      </div>
    </div>`;
  }).join('');
  s(`<div style="padding:18px 14px 80px">
    <h2 style="font-size:18px;font-weight:800;margin-bottom:6px">Signalements</h2>
    <p style="color:var(--muted);font-size:13px;margin-bottom:18px">${signals.length} signalement${signals.length>1?'s':''} ouvert${signals.length>1?'s':''}</p>
    ${signals.length===0?`<div style="text-align:center;padding:50px 0"><div style="font-size:56px">✅</div><div style="font-weight:700;margin-top:12px">Aucun signalement</div></div>`:cards}
  </div>`);
}

function closeSig(id){
  signals=signals.filter(sg=>sg.id!==id);
  showToast('✅ Signalement clôturé.');
  renderAdmin();
}

// ══════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════
render();
</script>
</body>
</html>
